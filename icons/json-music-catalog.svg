<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="jm" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Vinyl record -->
  <circle cx="38" cy="42" r="30" fill="url(#jm)" opacity=".12"/>
  <circle cx="38" cy="42" r="30" stroke="url(#jm)" stroke-width="1.5"/>
  <!-- Grooves -->
  <circle cx="38" cy="42" r="24" stroke="url(#jm)" stroke-width=".5" opacity=".25"/>
  <circle cx="38" cy="42" r="20" stroke="url(#jm)" stroke-width=".5" opacity=".2"/>
  <circle cx="38" cy="42" r="16" stroke="url(#jm)" stroke-width=".5" opacity=".15"/>
  <!-- Label -->
  <circle cx="38" cy="42" r="10" fill="url(#jm)" opacity=".35"/>
  <!-- Spindle hole -->
  <circle cx="38" cy="42" r="2.5" fill="#0f172a"/>
  <!-- Music note (top right) -->
  <line x1="62" y1="8" x2="62" y2="26" stroke="url(#jm)" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="57" cy="26" rx="5.5" ry="4" fill="url(#jm)" transform="rotate(-15 57 26)"/>
  <!-- Note flag -->
  <path d="M62 8C62 8 68 12 68 18" stroke="url(#jm)" stroke-width="2" fill="none" stroke-linecap="round" opacity=".7"/>
</svg>
