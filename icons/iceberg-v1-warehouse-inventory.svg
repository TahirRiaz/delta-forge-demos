<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="wh" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip (V1 marker) -->
  <path d="M40 6L50 20H30Z" fill="url(#wh)" fill-opacity=".2" stroke="url(#wh)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="40" y="17" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="url(#wh)" opacity=".9">V1</text>
  <!-- Waterline -->
  <path d="M8 22H72" stroke="url(#wh)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Warehouse building -->
  <path d="M18 34L40 24L62 34V60H18Z" fill="url(#wh)" fill-opacity=".1" stroke="url(#wh)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof peak line -->
  <path d="M18 34L40 24L62 34" stroke="url(#wh)" stroke-width="1.5" stroke-linejoin="round" opacity=".7"/>
  <!-- Warehouse door -->
  <rect x="34" y="46" width="12" height="14" rx="1" fill="url(#wh)" fill-opacity=".15" stroke="url(#wh)" stroke-width="1"/>
  <!-- Shelving lines -->
  <path d="M22 40H34" stroke="url(#wh)" stroke-width="1" opacity=".5"/>
  <path d="M22 46H34" stroke="url(#wh)" stroke-width="1" opacity=".4"/>
  <path d="M46 40H58" stroke="url(#wh)" stroke-width="1" opacity=".5"/>
  <path d="M46 46H58" stroke="url(#wh)" stroke-width="1" opacity=".4"/>
  <!-- Small boxes on shelves -->
  <rect x="23" y="37" width="4" height="3" rx=".5" fill="url(#wh)" fill-opacity=".35"/>
  <rect x="29" y="37" width="4" height="3" rx=".5" fill="url(#wh)" fill-opacity=".25"/>
  <rect x="47" y="37" width="4" height="3" rx=".5" fill="url(#wh)" fill-opacity=".35"/>
  <rect x="53" y="37" width="4" height="3" rx=".5" fill="url(#wh)" fill-opacity=".25"/>
  <!-- Floor line -->
  <path d="M12 60H68" stroke="url(#wh)" stroke-width="1" opacity=".3"/>
  <!-- Label -->
  <text x="40" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#wh)" opacity=".6">ICEBERG V1</text>
</svg>
