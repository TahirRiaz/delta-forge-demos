<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pp" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
  </defs>
  <!-- Partition columns -->
  <rect x="8" y="10" width="14" height="46" rx="3" stroke="url(#pp)" stroke-width="1.5" fill="url(#pp)" fill-opacity=".15"/>
  <rect x="24" y="10" width="14" height="46" rx="3" stroke="url(#pp)" stroke-width="1.5" fill="url(#pp)" fill-opacity=".15"/>
  <rect x="40" y="10" width="14" height="46" rx="3" stroke="url(#pp)" stroke-width="1.5" fill="url(#pp)" fill-opacity=".15"/>
  <rect x="56" y="10" width="14" height="46" rx="3" stroke="url(#pp)" stroke-width="1.5" fill="url(#pp)" fill-opacity=".15"/>
  <!-- Pruned partitions (X marks) -->
  <line x1="10" y1="12" x2="20" y2="54" stroke="url(#pp)" stroke-width="1" opacity=".4"/>
  <line x1="42" y1="12" x2="52" y2="54" stroke="url(#pp)" stroke-width="1" opacity=".4"/>
  <line x1="58" y1="12" x2="68" y2="54" stroke="url(#pp)" stroke-width="1" opacity=".4"/>
  <!-- Selected partition highlight -->
  <rect x="24" y="10" width="14" height="46" rx="3" stroke="url(#pp)" stroke-width="2" fill="url(#pp)" fill-opacity=".3"/>
  <!-- Magnifying glass -->
  <circle cx="62" cy="62" r="8" stroke="url(#pp)" stroke-width="1.5" fill="url(#pp)" fill-opacity=".1"/>
  <line x1="68" y1="68" x2="74" y2="74" stroke="url(#pp)" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="30" y="68" font-size="4" font-family="monospace" fill="url(#pp)" opacity=".6">PRUNE</text>
</svg>
