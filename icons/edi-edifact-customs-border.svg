<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="cb" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M40 8L14 20V42C14 56 25 67 40 72C55 67 66 56 66 42V20L40 8Z" stroke="url(#cb)" stroke-width="2" fill="url(#cb)" fill-opacity=".1"/>
