  <path d="M34 55L38 59L46 51" stroke="url(#cb)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".8"/>
  <!-- Scan lines (border inspection) -->
  <line x1="20" y1="24" x2="60" y2="24" stroke="url(#cb)" stroke-width="1" opacity=".25" stroke-dasharray="3 2"/>
  <line x1="18" y1="28" x2="62" y2="28" stroke="url(#cb)" stroke-width="1" opacity=".15" stroke-dasharray="3 2"/>
  <!-- Document icon (top-left) -->
  <rect x="8" y="10" width="8" height="10" rx="1" fill="url(#cb)" opacity=".35"/>
  <line x1="10" y1="13" x2="14" y2="13" stroke="url(#cb)" stroke-width=".6" opacity=".6"/>
  <line x1="10" y1="15.5" x2="14" y2="15.5" stroke="url(#cb)" stroke-width=".6" opacity=".6"/>
  <!-- Document icon (top-right) -->
  <rect x="64" y="10" width="8" height="10" rx="1" fill="url(#cb)" opacity=".35"/>
  <line x1="66" y1="13" x2="70" y2="13" stroke="url(#cb)" stroke-width=".6" opacity=".6"/>
  <line x1="66" y1="15.5" x2="70" y2="15.5" stroke="url(#cb)" stroke-width=".6" opacity=".6"/>
</svg>
