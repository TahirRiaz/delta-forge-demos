  <line x1="40" y1="8" x2="40" y2="72" stroke="url(#cb)" stroke-width="1" opacity=".2"/>
  <!-- Container/cargo box -->
  <rect x="28" y="32" width="24" height="16" rx="1.5" stroke="url(#cb)" stroke-width="1.5" fill="url(#cb)" fill-opacity=".15"/>
  <line x1="40" y1="32" x2="40" y2="48" stroke="url(#cb)" stroke-width="1" opacity=".4"/>
  <line x1="28" y1="38" x2="52" y2="38" stroke="url(#cb)" stroke-width="1" opacity=".3"/>
