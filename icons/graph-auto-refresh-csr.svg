<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="garc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="garcEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fdba74;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="80" height="80" rx="12" fill="url(#garc)"/>

  <!-- Circular refresh arrow (two opposing arcs) suggesting "refresh" -->
  <!-- Outer arc, top-left to bottom-right -->
  <path d="M 16 36 A 24 24 0 0 1 56 20"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Arrowhead at end of outer arc -->
  <path d="M 50 15 L 58 20 L 54 28"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <!-- Inner arc, bottom-right to top-left -->
  <path d="M 64 44 A 24 24 0 0 1 24 60"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Arrowhead at end of inner arc -->
  <path d="M 30 65 L 22 60 L 26 52"
        stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <!-- Three small graph-nodes in the centre to hint at CSR / graph -->
  <circle cx="40" cy="32" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="46" r="3.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="48" cy="46" r="3.5" fill="#ffffff" opacity="0.9"/>
  <!-- Edges between the nodes -->
  <line x1="40" y1="32" x2="32" y2="46" stroke="url(#garcEdge)" stroke-width="1.5" opacity="0.9"/>
  <line x1="40" y1="32" x2="48" y2="46" stroke="url(#garcEdge)" stroke-width="1.5" opacity="0.9"/>
  <line x1="32" y1="46" x2="48" y2="46" stroke="url(#garcEdge)" stroke-width="1.5" opacity="0.9"/>
</svg>
