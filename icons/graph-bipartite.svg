<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="gb" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Crossing edges: users (left) to movies (right) -->
  <line x1="16" y1="12" x2="58" y2="16" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="12" x2="58" y2="36" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="28" x2="58" y2="16" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="28" x2="58" y2="52" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="40" x2="58" y2="36" stroke="url(#gb)" stroke-width="1" opacity=".3"/>
  <line x1="16" y1="40" x2="58" y2="52" stroke="url(#gb)" stroke-width="1" opacity=".3"/>
  <line x1="16" y1="40" x2="58" y2="68" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="52" x2="58" y2="36" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="52" x2="58" y2="68" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="68" x2="58" y2="52" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <line x1="16" y1="68" x2="58" y2="68" stroke="url(#gb)" stroke-width="1" opacity=".25"/>
  <!-- Left column: subscriber nodes -->
  <circle cx="16" cy="12" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
  <circle cx="16" cy="28" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
  <circle cx="16" cy="40" r="5.5" fill="url(#gb)" fill-opacity=".3" stroke="url(#gb)" stroke-width="2"/>
  <circle cx="16" cy="52" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
  <circle cx="16" cy="68" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
  <!-- Right column: movie nodes -->
  <circle cx="58" cy="16" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
  <circle cx="58" cy="36" r="6" fill="url(#gb)" fill-opacity=".35" stroke="url(#gb)" stroke-width="2"/>
  <circle cx="58" cy="52" r="5" fill="url(#gb)" fill-opacity=".25" stroke="url(#gb)" stroke-width="1.5"/>
  <circle cx="58" cy="68" r="4.5" fill="url(#gb)" fill-opacity=".2" stroke="url(#gb)" stroke-width="1.5"/>
</svg>
