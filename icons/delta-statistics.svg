<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="st" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Bar chart for statistics -->
  <rect x="12" y="42" width="10" height="26" rx="2" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <rect x="26" y="28" width="10" height="40" rx="2" fill="url(#st)" fill-opacity=".3" stroke="url(#st)" stroke-width="1"/>
  <rect x="40" y="18" width="10" height="50" rx="2" fill="url(#st)" fill-opacity=".4" stroke="url(#st)" stroke-width="1"/>
  <rect x="54" y="34" width="10" height="34" rx="2" fill="url(#st)" fill-opacity=".25" stroke="url(#st)" stroke-width="1"/>
  <!-- Min/Max markers -->
  <line x1="40" y1="14" x2="50" y2="14" stroke="url(#st)" stroke-width="1.5" opacity=".8"/>
  <text x="55" y="17" font-size="6" font-family="monospace" fill="url(#st)" opacity=".7">MAX</text>
  <line x1="12" y1="72" x2="64" y2="72" stroke="url(#st)" stroke-width="1" opacity=".3"/>
  <text x="68" y="74" font-size="6" font-family="monospace" fill="url(#st)" opacity=".7">MIN</text>
  <!-- Skip indicator arrow -->
  <path d="M67 42L72 38L72 46Z" fill="url(#st)" opacity=".5"/>
  <path d="M67 48L72 44L72 52Z" fill="url(#st)" opacity=".3"/>
  <!-- Label -->
  <text x="40" y="10" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#st)" opacity=".6">STATS</text>
</svg>
