<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ger" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#e11d48"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </linearGradient>
  </defs>
  <!-- Hospital building -->
  <rect x="18" y="26" width="44" height="40" rx="3" fill="url(#ger)" opacity=".15" stroke="url(#ger)" stroke-width="1.5"/>
  <!-- Roof -->
  <rect x="22" y="20" width="36" height="8" rx="2" fill="url(#ger)" opacity=".3"/>
  <!-- Cross (medical) -->
  <rect x="36" y="32" width="8" height="24" rx="1.5" fill="url(#ger)" opacity=".6"/>
  <rect x="28" y="40" width="24" height="8" rx="1.5" fill="url(#ger)" opacity=".6"/>
  <!-- Location pin (incident) -->
  <circle cx="62" cy="18" r="6" fill="url(#ger)" opacity=".4"/>
  <circle cx="62" cy="18" r="2.5" fill="url(#ger)" opacity=".7"/>
  <path d="M62 24 L62 30" stroke="url(#ger)" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Signal waves -->
  <path d="M16 18 Q12 14 16 10" stroke="url(#ger)" stroke-width="1" opacity=".3" fill="none"/>
  <path d="M13 20 Q8 14 13 8" stroke="url(#ger)" stroke-width="1" opacity=".2" fill="none"/>
</svg>
