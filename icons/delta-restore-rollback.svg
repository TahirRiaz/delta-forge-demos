<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rr" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Circular arrow (rollback) -->
  <path d="M40 16A24 24 0 1 1 16 40" stroke="url(#rr)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="16,40 22,34 22,46" fill="url(#rr)" opacity=".8"/>
  <!-- Version markers along arc -->
  <circle cx="40" cy="16" r="3" fill="url(#rr)" opacity=".8"/>
  <text x="40" y="18" text-anchor="middle" font-size="5" font-family="monospace" fill="white">0</text>
  <circle cx="60" cy="24" r="3" fill="url(#rr)" opacity=".7"/>
  <text x="60" y="26" text-anchor="middle" font-size="5" font-family="monospace" fill="white">1</text>
  <circle cx="64" cy="40" r="3" fill="url(#rr)" opacity=".6"/>
  <text x="64" y="42" text-anchor="middle" font-size="5" font-family="monospace" fill="white">2</text>
  <circle cx="56" cy="56" r="3" fill="url(#rr)" opacity=".5"/>
  <text x="56" y="58" text-anchor="middle" font-size="5" font-family="monospace" fill="white">3</text>
  <!-- Restore label -->
  <text x="40" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#rr)" opacity=".6">RESTORE</text>
</svg>
