<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="er" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Shopping cart body -->
  <path d="M16 22H22L30 52H58L66 30H26" stroke="url(#er)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cart fill -->
  <path d="M26 30L30 52H58L66 30H26Z" fill="url(#er)" fill-opacity=".1"/>
  <!-- Cart wheels -->
  <circle cx="34" cy="58" r="4" stroke="url(#er)" stroke-width="1.5" fill="url(#er)" fill-opacity=".2"/>
  <circle cx="34" cy="58" r="1.5" fill="url(#er)" opacity=".5"/>
  <circle cx="54" cy="58" r="4" stroke="url(#er)" stroke-width="1.5" fill="url(#er)" fill-opacity=".2"/>
  <circle cx="54" cy="58" r="1.5" fill="url(#er)" opacity=".5"/>
  <!-- Barcode on item in cart -->
  <rect x="36" y="36" width="16" height="10" rx="1" fill="url(#er)" fill-opacity=".15" stroke="url(#er)" stroke-width="1" opacity=".5"/>
  <line x1="38" y1="38" x2="38" y2="44" stroke="url(#er)" stroke-width="1.2" opacity=".6"/>
  <line x1="40.5" y1="38" x2="40.5" y2="44" stroke="url(#er)" stroke-width=".8" opacity=".5"/>
  <line x1="42.5" y1="38" x2="42.5" y2="44" stroke="url(#er)" stroke-width="1.2" opacity=".6"/>
  <line x1="44.5" y1="38" x2="44.5" y2="44" stroke="url(#er)" stroke-width=".6" opacity=".5"/>
  <line x1="46.5" y1="38" x2="46.5" y2="44" stroke="url(#er)" stroke-width="1" opacity=".6"/>
  <line x1="48.5" y1="38" x2="48.5" y2="44" stroke="url(#er)" stroke-width=".8" opacity=".5"/>
  <line x1="50" y1="38" x2="50" y2="44" stroke="url(#er)" stroke-width="1.2" opacity=".6"/>
  <!-- GS1 label -->
  <text x="44" y="14" font-family="sans-serif" font-size="8" font-weight="bold" fill="url(#er)" opacity=".5" text-anchor="middle">GS1</text>
  <!-- Arrow cycle (supply chain flow) -->
  <path d="M10 40C10 28 18 18 30 14" stroke="url(#er)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".35"/>
  <path d="M70 40C70 52 62 62 50 66" stroke="url(#er)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity=".35"/>
</svg>
