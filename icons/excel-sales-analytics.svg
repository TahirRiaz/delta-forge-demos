<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="es" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Spreadsheet frame -->
  <rect x="8" y="8" width="64" height="64" rx="4" stroke="url(#es)" stroke-width="1.5" fill="url(#es)" fill-opacity=".05"/>
  <!-- Grid lines -->
  <line x1="8" y1="22" x2="72" y2="22" stroke="url(#es)" stroke-width=".5" opacity=".2"/>
  <line x1="8" y1="36" x2="72" y2="36" stroke="url(#es)" stroke-width=".5" opacity=".15"/>
  <line x1="8" y1="50" x2="72" y2="50" stroke="url(#es)" stroke-width=".5" opacity=".15"/>
  <line x1="28" y1="8" x2="28" y2="72" stroke="url(#es)" stroke-width=".5" opacity=".15"/>
  <line x1="48" y1="8" x2="48" y2="72" stroke="url(#es)" stroke-width=".5" opacity=".15"/>
  <!-- Header row highlight -->
  <rect x="8" y="8" width="64" height="14" rx="4" fill="url(#es)" opacity=".12"/>
  <!-- Trend line -->
  <polyline points="14,60 26,50 38,54 50,34 62,16" stroke="url(#es)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data points -->
  <circle cx="14" cy="60" r="3" fill="url(#es)"/>
  <circle cx="26" cy="50" r="3" fill="url(#es)" opacity=".9"/>
  <circle cx="38" cy="54" r="3" fill="url(#es)" opacity=".85"/>
  <circle cx="50" cy="34" r="3" fill="url(#es)" opacity=".9"/>
  <circle cx="62" cy="16" r="3" fill="url(#es)"/>
</svg>
