  <circle cx="33" cy="52" r="3" fill="url(#ubf)" opacity=".5"/>
  <circle cx="42" cy="52" r="3" fill="url(#ubf)" opacity=".3"/>
  <circle cx="51" cy="52" r="3" fill="url(#ubf)" opacity=".5"/>
  <!-- Search magnifier -->
