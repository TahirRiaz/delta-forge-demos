<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="od" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Gauge arc background -->
  <path d="M16 55 A28 28 0 0 1 64 55" stroke="url(#od)" stroke-width="2" fill="none" opacity=".25"/>
  <!-- Gauge fill (95% danger zone) -->
  <path d="M16 55 A28 28 0 0 1 61 35" stroke="url(#od)" stroke-width="3" fill="none" opacity=".7"/>
  <!-- Gauge needle pointing near max -->
  <line x1="40" y1="52" x2="57" y2="33" stroke="url(#od)" stroke-width="2" stroke-linecap="round"/>
  <circle cx="40" cy="52" r="3" fill="url(#od)" opacity=".8"/>
  <!-- INT MAX label -->
  <text x="66" y="30" text-anchor="start" font-size="5" font-family="monospace" fill="url(#od)" opacity=".7">MAX</text>
  <!-- Warning triangle -->
  <path d="M37 14 L43 14 L40 8 Z" fill="url(#od)" opacity=".6"/>
  <text x="40" y="13" text-anchor="middle" font-size="5" font-family="monospace" fill="#fff" opacity=".9">!</text>
  <!-- Balance bars rising toward limit -->
  <rect x="12" y="62" width="8" height="8" rx="1" fill="url(#od)" opacity=".2"/>
  <rect x="24" y="56" width="8" height="14" rx="1" fill="url(#od)" opacity=".35"/>
  <rect x="36" y="48" width="8" height="22" rx="1" fill="url(#od)" opacity=".5"/>
  <rect x="48" y="38" width="8" height="32" rx="1" fill="url(#od)" opacity=".65"/>
  <rect x="60" y="30" width="8" height="40" rx="1" fill="url(#od)" opacity=".8"/>
  <!-- Danger threshold line -->
  <line x1="10" y1="35" x2="70" y2="35" stroke="url(#od)" stroke-width="1" stroke-dasharray="3 2" opacity=".4"/>
</svg>
