<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="emailBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="emailEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#emailBg)"/>
  <!-- Dense directed email network with many connections -->
  <!-- Arrow markers for directed edges -->
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0 0, 6 2, 0 4" fill="#c4b5fd" opacity="0.6"/>
    </marker>
  </defs>
  <!-- Directed edges (with arrows) -->
  <line x1="60" y1="30" x2="38" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="30" x2="82" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="38" y1="42" x2="60" y2="30" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="82" y1="42" x2="60" y2="50" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="38" y1="42" x2="60" y2="50" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="50" x2="38" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="50" x2="82" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="22" y1="34" x2="38" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="98" y1="34" x2="82" y2="42" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="30" y1="58" x2="60" y2="50" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="90" y1="58" x2="60" y2="50" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="50" x2="50" y2="66" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="60" y1="50" x2="70" y2="66" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="38" y1="42" x2="30" y2="58" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="82" y1="42" x2="90" y2="58" stroke="url(#emailEdge)" stroke-width="1" marker-end="url(#arrowhead)"/>
  <!-- Central hub -->
  <circle cx="60" cy="50" r="7" fill="#ffffff" opacity="0.95"/>
  <!-- Primary nodes -->
  <circle cx="60" cy="30" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="38" cy="42" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="82" cy="42" r="6" fill="#ffffff" opacity="0.9"/>
  <!-- Secondary nodes -->
  <circle cx="22" cy="34" r="4" fill="#ffffff" opacity="0.75"/>
  <circle cx="98" cy="34" r="4" fill="#ffffff" opacity="0.75"/>
  <circle cx="30" cy="58" r="4" fill="#ffffff" opacity="0.75"/>
  <circle cx="90" cy="58" r="4" fill="#ffffff" opacity="0.75"/>
  <circle cx="50" cy="66" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="70" cy="66" r="4" fill="#ffffff" opacity="0.7"/>
  <!-- Label -->
  <text x="60" y="84" font-family="sans-serif" font-size="10" fill="#e0e7ff" text-anchor="middle" font-weight="bold" letter-spacing="1">EMAIL-EU</text>
  <text x="60" y="97" font-family="monospace" font-size="7" fill="#c7d2fe" text-anchor="middle" opacity="0.8">1,005 persons</text>
  <text x="60" y="106" font-family="monospace" font-size="7" fill="#c7d2fe" text-anchor="middle" opacity="0.6">25,571 edges</text>
</svg>
