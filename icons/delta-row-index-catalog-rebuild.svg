  <rect x="14" y="40" width="46" height="8" rx="1" fill="url(#rcr)" opacity=".55" stroke="url(#rcr)" stroke-width="1.2"/>
  <rect x="20" y="50" width="38" height="8" rx="1" fill="url(#rcr)" opacity=".7"  stroke="url(#rcr)" stroke-width="1.2"/>
  <!-- refresh arrow -->
