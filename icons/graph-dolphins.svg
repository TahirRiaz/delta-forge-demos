<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="dolphinBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dolphinEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#dolphinBg)"/>
  <!-- Social network edges -->
  <line x1="40" y1="22" x2="60" y2="40" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="80" y1="22" x2="60" y2="40" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="40" y1="22" x2="24" y2="40" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="80" y1="22" x2="96" y2="40" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="24" y1="40" x2="60" y2="40" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="96" y1="40" x2="60" y2="40" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="24" y1="40" x2="32" y2="58" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="96" y1="40" x2="88" y2="58" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="60" y1="40" x2="32" y2="58" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="60" y1="40" x2="88" y2="58" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="60" y1="40" x2="60" y2="62" stroke="url(#dolphinEdge)" stroke-width="1.5"/>
  <line x1="32" y1="58" x2="60" y2="62" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="88" y1="58" x2="60" y2="62" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="32" y1="58" x2="44" y2="72" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="88" y1="58" x2="76" y2="72" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="60" y1="62" x2="44" y2="72" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <line x1="60" y1="62" x2="76" y2="72" stroke="url(#dolphinEdge)" stroke-width="1"/>
  <!-- Central hub -->
  <circle cx="60" cy="40" r="7" fill="#ffffff" opacity="0.95"/>
  <!-- Primary nodes -->
  <circle cx="40" cy="22" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="80" cy="22" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="24" cy="40" r="5" fill="#ffffff" opacity="0.85"/>
  <circle cx="96" cy="40" r="5" fill="#ffffff" opacity="0.85"/>
  <!-- Secondary nodes -->
  <circle cx="32" cy="58" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="88" cy="58" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="60" cy="62" r="5" fill="#ffffff" opacity="0.75"/>
  <circle cx="44" cy="72" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="76" cy="72" r="4" fill="#ffffff" opacity="0.7"/>
  <!-- Label -->
  <text x="60" y="90" font-family="sans-serif" font-size="11" fill="#a5f3fc" text-anchor="middle" font-weight="bold" letter-spacing="1">DOLPHINS</text>
  <text x="60" y="103" font-family="monospace" font-size="7" fill="#bae6fd" text-anchor="middle" opacity="0.8">62 dolphins</text>
  <text x="60" y="112" font-family="monospace" font-size="7" fill="#bae6fd" text-anchor="middle" opacity="0.6">159 edges</text>
