<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a3e635"/>
      <stop offset="1" stop-color="#65a30d"/>
    </linearGradient>
  </defs>
  <!-- Binary hash display -->
  <rect x="10" y="8" width="60" height="18" rx="3" stroke="url(#bg)" stroke-width="1.5" fill="url(#bg)" fill-opacity=".1"/>
  <text x="40" y="16" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#bg)" opacity=".6">a3f2...c8d1</text>
  <text x="40" y="22" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#bg)" opacity=".4">SHA-256</text>
  <!-- Map/geometry area -->
  <rect x="10" y="30" width="60" height="36" rx="4" stroke="url(#bg)" stroke-width="1.5" fill="url(#bg)" fill-opacity=".08"/>
  <!-- Point markers -->
  <circle cx="24" cy="42" r="3" fill="url(#bg)" fill-opacity=".5" stroke="url(#bg)" stroke-width="1"/>
  <circle cx="50" cy="38" r="3" fill="url(#bg)" fill-opacity=".5" stroke="url(#bg)" stroke-width="1"/>
  <circle cx="38" cy="54" r="3" fill="url(#bg)" fill-opacity=".5" stroke="url(#bg)" stroke-width="1"/>
  <!-- Polygon shape -->
  <path d="M55 48L65 44L68 54L58 58Z" stroke="url(#bg)" stroke-width="1" fill="url(#bg)" fill-opacity=".2" stroke-linejoin="round"/>
  <!-- Coordinate grid lines -->
  <line x1="10" y1="48" x2="70" y2="48" stroke="url(#bg)" stroke-width=".5" opacity=".2"/>
  <line x1="40" y1="30" x2="40" y2="66" stroke="url(#bg)" stroke-width=".5" opacity=".2"/>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#bg)" opacity=".6">GEO+BINARY</text>
</svg>
