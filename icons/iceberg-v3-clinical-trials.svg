<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ct" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip (V3 marker) -->
  <path d="M40 6L50 20H30Z" fill="url(#ct)" fill-opacity=".2" stroke="url(#ct)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="40" y="17" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="url(#ct)" opacity=".9">V3</text>
  <!-- Waterline -->
  <path d="M8 22H72" stroke="url(#ct)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Erlenmeyer flask body -->
  <path d="M34 30V44L22 60C21 62 22 64 24 64H56C58 64 59 62 58 60L46 44V30" fill="url(#ct)" fill-opacity=".1" stroke="url(#ct)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Flask neck -->
  <rect x="34" y="26" width="12" height="6" rx="1" fill="url(#ct)" fill-opacity=".08" stroke="url(#ct)" stroke-width="1.5"/>
  <!-- Liquid line inside flask -->
  <path d="M28 52H52" stroke="url(#ct)" stroke-width="1" opacity=".4"/>
  <!-- Liquid fill -->
  <path d="M28 52L22 60C21 62 22 64 24 64H56C58 64 59 62 58 60L52 52Z" fill="url(#ct)" fill-opacity=".15"/>
  <!-- Bubbles in liquid -->
  <circle cx="35" cy="57" r="1.5" fill="url(#ct)" fill-opacity=".3"/>
  <circle cx="44" cy="55" r="1" fill="url(#ct)" fill-opacity=".25"/>
  <circle cx="40" cy="59" r="1.2" fill="url(#ct)" fill-opacity=".2"/>
  <!-- Plus/cross mark (medical) -->
  <path d="M38 36H42M40 34V38" stroke="url(#ct)" stroke-width="1.5" stroke-linecap="round" opacity=".6"/>
  <!-- Label -->
  <text x="40" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#ct)" opacity=".6">ICEBERG V3</text>
</svg>
