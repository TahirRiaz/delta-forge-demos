<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="vt" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f472b6"/>
      <stop offset="1" stop-color="#be185d"/>
    </linearGradient>
  </defs>
  <!-- JSON-like braces -->
  <text x="12" y="44" font-size="28" font-family="monospace" fill="url(#vt)" opacity=".3">{</text>
  <text x="58" y="44" font-size="28" font-family="monospace" fill="url(#vt)" opacity=".3">}</text>
  <!-- Mixed type indicators -->
  <text x="30" y="26" font-size="5" font-family="monospace" fill="url(#vt)" opacity=".7">"str"</text>
  <text x="38" y="38" font-size="6" font-family="monospace" fill="url(#vt)" opacity=".8">42</text>
  <text x="30" y="50" font-size="5" font-family="monospace" fill="url(#vt)" opacity=".6">[1,2]</text>
  <text x="38" y="60" font-size="5" font-family="monospace" fill="url(#vt)" opacity=".7">true</text>
  <!-- VARIANT label -->
  <rect x="18" y="66" width="44" height="10" rx="5" fill="url(#vt)" fill-opacity=".2" stroke="url(#vt)" stroke-width="1"/>
  <text x="40" y="73" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#vt)" opacity=".8">VARIANT</text>
</svg>
