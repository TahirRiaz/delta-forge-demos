<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ai" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Building body -->
  <rect x="18" y="34" width="44" height="40" rx="2" fill="url(#ai)" opacity=".2" stroke="url(#ai)" stroke-width="1.5"/>
  <!-- Roof -->
  <path d="M14 36L40 16L66 36" stroke="url(#ai)" stroke-width="2" fill="url(#ai)" fill-opacity=".1" stroke-linejoin="round"/>
  <!-- Windows -->
  <rect x="26" y="44" width="9" height="9" rx="1.5" fill="url(#ai)" opacity=".45"/>
  <rect x="45" y="44" width="9" height="9" rx="1.5" fill="url(#ai)" opacity=".45"/>
  <rect x="26" y="59" width="9" height="9" rx="1.5" fill="url(#ai)" opacity=".35"/>
  <rect x="45" y="59" width="9" height="9" rx="1.5" fill="url(#ai)" opacity=".35"/>
  <!-- Door -->
  <rect x="36" y="60" width="8" height="14" rx="1" fill="url(#ai)" opacity=".5"/>
  <!-- Signal arcs from roof -->
  <path d="M34 12A8 8 0 0 1 46 12" stroke="url(#ai)" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M29 8A14 14 0 0 1 51 8" stroke="url(#ai)" stroke-width="1.5" fill="none" opacity=".45" stroke-linecap="round"/>
  <path d="M24 4A20 20 0 0 1 56 4" stroke="url(#ai)" stroke-width="1.5" fill="none" opacity=".25" stroke-linecap="round"/>
</svg>
