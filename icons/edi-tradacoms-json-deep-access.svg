<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="jd" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- JSON braces -->
  <text x="12" y="52" font-family="monospace" font-size="40" font-weight="bold" fill="url(#jd)" opacity=".25">{</text>
  <text x="54" y="52" font-family="monospace" font-size="40" font-weight="bold" fill="url(#jd)" opacity=".25">}</text>
  <!-- Nested data layers -->
  <rect x="24" y="20" width="32" height="8" rx="2" fill="url(#jd)" opacity=".3"/>
  <rect x="28" y="32" width="24" height="8" rx="2" fill="url(#jd)" opacity=".45"/>
  <rect x="32" y="44" width="16" height="8" rx="2" fill="url(#jd)" opacity=".65"/>
  <!-- Extraction arrow -->
  <path d="M40 56L40 68M36 64L40 68L44 64" stroke="url(#jd)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Target dot -->
  <circle cx="40" cy="72" r="3" fill="url(#jd)" opacity=".85"/>
  <!-- Search magnifier -->
  <circle cx="58" y="18" r="8" cx="60" cy="16" stroke="url(#jd)" stroke-width="1.5" fill="none" opacity=".6"/>
  <line x1="65" y1="22" x2="70" y2="27" stroke="url(#jd)" stroke-width="1.5" opacity=".6" stroke-linecap="round"/>
</svg>
