<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Hash dedup indicator -->
  <rect x="8" y="6" width="28" height="14" rx="3" stroke="url(#bg)" stroke-width="1.5" fill="url(#bg)" fill-opacity=".1"/>
  <text x="22" y="12" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#bg)" opacity=".6">a3f2...c8d1</text>
  <text x="22" y="17" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#bg)" opacity=".4">DEDUP</text>
  <!-- Window/analytics indicator -->
  <rect x="44" y="6" width="28" height="14" rx="3" stroke="url(#bg)" stroke-width="1.5" fill="url(#bg)" fill-opacity=".1"/>
  <text x="58" y="12" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#bg)" opacity=".6">OVER()</text>
  <text x="58" y="17" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#bg)" opacity=".4">RANK</text>
  <!-- Map/geometry area -->
  <rect x="8" y="24" width="64" height="36" rx="4" stroke="url(#bg)" stroke-width="1.5" fill="url(#bg)" fill-opacity=".06"/>
  <!-- Bounding box (dashed) -->
  <rect x="14" y="28" width="24" height="18" rx="2" stroke="url(#bg)" stroke-width="1" stroke-dasharray="3 2" fill="url(#bg)" fill-opacity=".08"/>
  <!-- Point markers inside bbox -->
  <circle cx="20" cy="34" r="2.5" fill="url(#bg)" fill-opacity=".6" stroke="url(#bg)" stroke-width="0.8"/>
  <circle cx="30" cy="38" r="2.5" fill="url(#bg)" fill-opacity=".6" stroke="url(#bg)" stroke-width="0.8"/>
  <circle cx="25" cy="42" r="2.5" fill="url(#bg)" fill-opacity=".6" stroke="url(#bg)" stroke-width="0.8"/>
  <!-- Distance line between two points -->
  <line x1="20" y1="34" x2="30" y2="38" stroke="url(#bg)" stroke-width="1" stroke-dasharray="2 1" opacity=".5"/>
  <text x="26" y="33" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#bg)" opacity=".5">340km</text>
  <!-- Points outside bbox -->
  <circle cx="50" cy="32" r="2.5" fill="url(#bg)" fill-opacity=".3" stroke="url(#bg)" stroke-width="0.8"/>
  <circle cx="60" cy="44" r="2.5" fill="url(#bg)" fill-opacity=".3" stroke="url(#bg)" stroke-width="0.8"/>
  <!-- Polygon shape -->
  <path d="M48 48L58 44L64 52L54 56Z" stroke="url(#bg)" stroke-width="1" fill="url(#bg)" fill-opacity=".15" stroke-linejoin="round"/>
  <!-- Join arrow (docs ↔ locations) -->
  <path d="M40 52L40 56" stroke="url(#bg)" stroke-width="1.5" opacity=".4"/>
  <path d="M36 56L40 60L44 56" stroke="url(#bg)" stroke-width="1" fill="none" opacity=".4"/>
  <!-- Coordinate grid -->
  <line x1="8" y1="42" x2="72" y2="42" stroke="url(#bg)" stroke-width=".4" opacity=".15"/>
  <line x1="40" y1="24" x2="40" y2="60" stroke="url(#bg)" stroke-width=".4" opacity=".15"/>
  <!-- Label -->
  <text x="40" y="72" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#bg)" opacity=".6">GEO+HASH+CTE</text>
</svg>
