<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ine" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Lab flask body -->
  <path d="M30 28 L30 48 L22 62 Q20 66 24 66 L56 66 Q60 66 58 62 L50 48 L50 28" fill="url(#ine)" opacity=".2" stroke="url(#ine)" stroke-width="1.5"/>
  <!-- Flask neck -->
  <rect x="32" y="18" width="16" height="12" rx="2" fill="url(#ine)" opacity=".3" stroke="url(#ine)" stroke-width="1.5"/>
  <!-- Liquid level with gap (NULL symbol) -->
  <rect x="26" y="52" width="28" height="12" rx="1" fill="url(#ine)" opacity=".4"/>
  <!-- NULL question mark -->
  <text x="40" y="45" font-family="sans-serif" font-size="14" font-weight="bold" fill="url(#ine)" opacity=".7" text-anchor="middle">?</text>
  <!-- Small NULL indicators -->
  <circle cx="24" cy="28" r="3" fill="url(#ine)" opacity=".5"/>
  <line x1="22" y1="26" x2="26" y2="30" stroke="url(#ine)" stroke-width="1.5" opacity=".5"/>
  <circle cx="56" cy="28" r="3" fill="url(#ine)" opacity=".5"/>
  <line x1="54" y1="26" x2="58" y2="30" stroke="url(#ine)" stroke-width="1.5" opacity=".5"/>
</svg>
