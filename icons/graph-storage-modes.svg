<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="gsm" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Three stacked storage layers -->
  <rect x="14" y="10" width="52" height="14" rx="3" fill="url(#gsm)" fill-opacity=".15" stroke="url(#gsm)" stroke-width="1.5"/>
  <line x1="14" y1="17" x2="66" y2="17" stroke="url(#gsm)" stroke-width="0.5" opacity=".3"/>
  <rect x="14" y="28" width="52" height="14" rx="3" fill="url(#gsm)" fill-opacity=".25" stroke="url(#gsm)" stroke-width="1.5"/>
  <line x1="14" y1="35" x2="66" y2="35" stroke="url(#gsm)" stroke-width="0.5" opacity=".3"/>
  <rect x="14" y="46" width="52" height="14" rx="3" fill="url(#gsm)" fill-opacity=".35" stroke="url(#gsm)" stroke-width="1.5"/>
  <line x1="14" y1="53" x2="66" y2="53" stroke="url(#gsm)" stroke-width="0.5" opacity=".3"/>
  <!-- Graph nodes overlaid -->
  <circle cx="28" cy="17" r="3.5" fill="url(#gsm)" fill-opacity=".5" stroke="url(#gsm)" stroke-width="1.5"/>
  <circle cx="52" cy="17" r="3.5" fill="url(#gsm)" fill-opacity=".5" stroke="url(#gsm)" stroke-width="1.5"/>
  <circle cx="40" cy="35" r="4" fill="url(#gsm)" fill-opacity=".6" stroke="url(#gsm)" stroke-width="1.5"/>
  <circle cx="24" cy="53" r="3.5" fill="url(#gsm)" fill-opacity=".5" stroke="url(#gsm)" stroke-width="1.5"/>
  <circle cx="56" cy="53" r="3.5" fill="url(#gsm)" fill-opacity=".5" stroke="url(#gsm)" stroke-width="1.5"/>
  <!-- Edges connecting across layers -->
  <line x1="28" y1="20" x2="40" y2="32" stroke="url(#gsm)" stroke-width="1.5" opacity=".5"/>
  <line x1="52" y1="20" x2="40" y2="32" stroke="url(#gsm)" stroke-width="1.5" opacity=".5"/>
  <line x1="40" y1="38" x2="24" y2="50" stroke="url(#gsm)" stroke-width="1.5" opacity=".5"/>
  <line x1="40" y1="38" x2="56" y2="50" stroke="url(#gsm)" stroke-width="1.5" opacity=".5"/>
  <!-- Equals sign — proving equivalence -->
  <rect x="32" y="66" width="16" height="2.5" rx="1" fill="url(#gsm)" opacity=".7"/>
  <rect x="32" y="72" width="16" height="2.5" rx="1" fill="url(#gsm)" opacity=".7"/>
</svg>
