<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="cf" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Feed/stream lines -->
  <line x1="14" y1="20" x2="66" y2="20" stroke="url(#cf)" stroke-width="1.5" opacity=".4"/>
  <line x1="14" y1="32" x2="66" y2="32" stroke="url(#cf)" stroke-width="1.5" opacity=".5"/>
  <line x1="14" y1="44" x2="66" y2="44" stroke="url(#cf)" stroke-width="1.5" opacity=".6"/>
  <!-- Change indicators (+ insert, ~ update, - delete) -->
  <circle cx="20" cy="20" r="4" fill="url(#cf)" fill-opacity=".2" stroke="url(#cf)" stroke-width="1"/>
  <text x="20" y="22" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#cf)">+</text>
  <circle cx="40" cy="32" r="4" fill="url(#cf)" fill-opacity=".2" stroke="url(#cf)" stroke-width="1"/>
  <text x="40" y="35" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#cf)">~</text>
  <circle cx="60" cy="44" r="4" fill="url(#cf)" fill-opacity=".2" stroke="url(#cf)" stroke-width="1"/>
  <text x="60" y="47" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#cf)">−</text>
  <!-- Arrow flowing down -->
  <path d="M40 52L40 66" stroke="url(#cf)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="40,70 35,64 45,64" fill="url(#cf)" opacity=".7"/>
  <text x="40" y="78" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#cf)" opacity=".6">CDF</text>
</svg>
