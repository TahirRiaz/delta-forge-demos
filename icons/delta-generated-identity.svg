<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="gi" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Calculator/formula shape -->
  <rect x="16" y="10" width="48" height="36" rx="4" stroke="url(#gi)" stroke-width="2" fill="url(#gi)" fill-opacity=".1"/>
  <!-- Formula display -->
  <text x="40" y="24" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#gi)" opacity=".8">f(x)=</text>
  <text x="40" y="38" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#gi)" opacity=".6">qty×price</text>
  <!-- Sequential ID column -->
  <rect x="16" y="52" width="14" height="22" rx="2" stroke="url(#gi)" stroke-width="1" fill="url(#gi)" fill-opacity=".15"/>
  <text x="23" y="60" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#gi)" opacity=".7">1</text>
  <text x="23" y="67" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#gi)" opacity=".6">2</text>
  <text x="23" y="72" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#gi)" opacity=".5">3</text>
  <!-- Computed column -->
  <rect x="34" y="52" width="14" height="22" rx="2" stroke="url(#gi)" stroke-width="1" fill="url(#gi)" fill-opacity=".2"/>
  <text x="41" y="60" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".7">$99</text>
  <text x="41" y="67" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".6">$45</text>
  <text x="41" y="72" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".5">$78</text>
  <!-- Arrow from formula to column -->
  <rect x="52" y="52" width="14" height="22" rx="2" stroke="url(#gi)" stroke-width="1" fill="url(#gi)" fill-opacity=".25"/>
  <text x="59" y="60" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".7">tax</text>
  <text x="59" y="67" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".6">tax</text>
  <text x="59" y="72" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#gi)" opacity=".5">tax</text>
</svg>
