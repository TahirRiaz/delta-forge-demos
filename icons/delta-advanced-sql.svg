<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="as" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Chart with trend line (stock chart) -->
  <rect x="12" y="10" width="56" height="50" rx="4" stroke="url(#as)" stroke-width="1.5" fill="url(#as)" fill-opacity=".08"/>
  <!-- Grid lines -->
  <line x1="12" y1="22" x2="68" y2="22" stroke="url(#as)" stroke-width="0.5" opacity=".15"/>
  <line x1="12" y1="34" x2="68" y2="34" stroke="url(#as)" stroke-width="0.5" opacity=".15"/>
  <line x1="12" y1="46" x2="68" y2="46" stroke="url(#as)" stroke-width="0.5" opacity=".15"/>
  <!-- Candlestick-style bars -->
  <line x1="20" y1="25" x2="20" y2="45" stroke="url(#as)" stroke-width="1" opacity=".4"/>
  <rect x="18" y="30" width="4" height="8" fill="url(#as)" opacity=".5"/>
  <line x1="30" y1="20" x2="30" y2="40" stroke="url(#as)" stroke-width="1" opacity=".4"/>
  <rect x="28" y="24" width="4" height="10" fill="url(#as)" opacity=".6"/>
  <line x1="40" y1="18" x2="40" y2="38" stroke="url(#as)" stroke-width="1" opacity=".4"/>
  <rect x="38" y="20" width="4" height="12" fill="url(#as)" opacity=".5"/>
  <line x1="50" y1="15" x2="50" y2="35" stroke="url(#as)" stroke-width="1" opacity=".4"/>
  <rect x="48" y="18" width="4" height="10" fill="url(#as)" opacity=".7"/>
  <line x1="60" y1="12" x2="60" y2="32" stroke="url(#as)" stroke-width="1" opacity=".4"/>
  <rect x="58" y="14" width="4" height="12" fill="url(#as)" opacity=".6"/>
  <!-- Trend line -->
  <polyline points="20,35 30,28 40,26 50,22 60,18" stroke="url(#as)" stroke-width="2" fill="none" opacity=".8"/>
  <!-- Window function bracket -->
  <text x="40" y="72" text-anchor="middle" font-size="8" font-family="monospace" fill="url(#as)" opacity=".7">OVER()</text>
</svg>
