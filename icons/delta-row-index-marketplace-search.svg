<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rms" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <!-- storefront roof -->
  <path d="M14 22 L40 12 L66 22 L62 28 L18 28 Z" fill="url(#rms)" opacity=".4" stroke="url(#rms)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- storefront walls -->
  <rect x="18" y="28" width="44" height="36" rx="1" fill="url(#rms)" opacity=".15" stroke="url(#rms)" stroke-width="1.5"/>
  <!-- columns / shelves -->
  <line x1="28" y1="28" x2="28" y2="64" stroke="url(#rms)" stroke-width="1.5" opacity=".5"/>
  <line x1="40" y1="28" x2="40" y2="64" stroke="url(#rms)" stroke-width="1.5" opacity=".5"/>
  <line x1="52" y1="28" x2="52" y2="64" stroke="url(#rms)" stroke-width="1.5" opacity=".5"/>
  <line x1="18" y1="40" x2="62" y2="40" stroke="url(#rms)" stroke-width="1.2" opacity=".4"/>
  <line x1="18" y1="52" x2="62" y2="52" stroke="url(#rms)" stroke-width="1.2" opacity=".4"/>
  <!-- price tags -->
  <circle cx="22" cy="34" r="2" fill="url(#rms)" opacity=".7"/>
  <circle cx="34" cy="34" r="2" fill="url(#rms)" opacity=".7"/>
  <circle cx="46" cy="34" r="2" fill="url(#rms)" opacity=".7"/>
  <circle cx="58" cy="34" r="2" fill="url(#rms)" opacity=".7"/>
  <circle cx="22" cy="46" r="2" fill="url(#rms)" opacity=".5"/>
  <circle cx="34" cy="46" r="2" fill="url(#rms)" opacity=".5"/>
  <circle cx="46" cy="46" r="2" fill="url(#rms)" opacity=".5"/>
  <circle cx="58" cy="46" r="2" fill="url(#rms)" opacity=".5"/>
  <circle cx="22" cy="58" r="2" fill="url(#rms)" opacity=".4"/>
  <circle cx="34" cy="58" r="2" fill="url(#rms)" opacity=".4"/>
  <circle cx="46" cy="58" r="2" fill="url(#rms)" opacity=".4"/>
  <circle cx="58" cy="58" r="2" fill="url(#rms)" opacity=".4"/>
</svg>
