<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pd" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip (V2 marker) -->
  <path d="M40 4L52 20H28Z" fill="url(#pd)" fill-opacity=".15" stroke="url(#pd)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="40" y="16" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="url(#pd)" opacity=".9">V2</text>
  <!-- Waterline -->
  <path d="M6 22H74" stroke="url(#pd)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Data block (parquet file representation) -->
  <rect x="12" y="30" width="38" height="26" rx="3" fill="url(#pd)" fill-opacity=".08" stroke="url(#pd)" stroke-width="1.5"/>
  <!-- Data rows inside block -->
  <line x1="16" y1="37" x2="46" y2="37" stroke="url(#pd)" stroke-width="1" opacity=".3"/>
  <line x1="16" y1="41" x2="46" y2="41" stroke="url(#pd)" stroke-width="1" opacity=".3"/>
  <line x1="16" y1="45" x2="46" y2="45" stroke="url(#pd)" stroke-width="1" opacity=".3"/>
  <line x1="16" y1="49" x2="46" y2="49" stroke="url(#pd)" stroke-width="1" opacity=".3"/>
  <!-- Deleted row strikethroughs (red-ish via lower opacity) -->
  <line x1="16" y1="37" x2="46" y2="37" stroke="#ef4444" stroke-width="1.5" opacity=".5"/>
  <line x1="16" y1="45" x2="46" y2="45" stroke="#ef4444" stroke-width="1.5" opacity=".5"/>
  <!-- X marks for deleted rows -->
  <g stroke="#ef4444" stroke-width="1.2" opacity=".6">
    <line x1="47" y1="35" x2="51" y2="39"/>
    <line x1="51" y1="35" x2="47" y2="39"/>
    <line x1="47" y1="43" x2="51" y2="47"/>
    <line x1="51" y1="43" x2="47" y2="47"/>
  </g>
  <!-- Delete vector file (small overlapping doc) -->
  <rect x="52" y="34" width="18" height="22" rx="2" fill="url(#pd)" fill-opacity=".12" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="2 1.5"/>
  <text x="61" y="43" text-anchor="middle" font-size="5" font-family="monospace" font-weight="bold" fill="#ef4444" opacity=".7">DV</text>
  <text x="61" y="51" text-anchor="middle" font-size="4" font-family="monospace" fill="#ef4444" opacity=".5">pos</text>
  <!-- Thermometer (cold-chain) -->
  <rect x="14" y="60" width="3" height="10" rx="1.5" fill="url(#pd)" fill-opacity=".15" stroke="url(#pd)" stroke-width="1"/>
  <circle cx="15.5" cy="72" r="3" fill="url(#pd)" fill-opacity=".25" stroke="url(#pd)" stroke-width="1"/>
  <rect x="14.5" y="64" width="2" height="6" rx="1" fill="url(#pd)" fill-opacity=".4"/>
  <!-- Label -->
  <text x="45" y="74" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pd)" opacity=".6">POSITION DELETES</text>
</svg>
