      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip -->
  <path d="M40 6L52 26H28Z" fill="url(#ub)" fill-opacity=".2" stroke="url(#ub)" stroke-width="1.5" stroke-linejoin="round"/>
