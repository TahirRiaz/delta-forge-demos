<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ffrc" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#facc15"/>
      <stop offset="1" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <!-- Euro coin -->
  <circle cx="26" cy="40" r="18" fill="url(#ffrc)" opacity=".85" stroke="url(#ffrc)" stroke-width="1.4"/>
  <text x="26" y="48" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1f2937" text-anchor="middle">€</text>
  <!-- Dollar coin (behind right) -->
  <circle cx="54" cy="40" r="18" fill="url(#ffrc)" opacity=".55" stroke="url(#ffrc)" stroke-width="1.4"/>
  <text x="54" y="48" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#1f2937" text-anchor="middle">$</text>
  <!-- ALTER / arrow between them -->
  <path d="M38 32 L46 40 L38 48" stroke="#0b1220" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  <path d="M42 48 L34 40 L42 32" stroke="#0b1220" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
</svg>
