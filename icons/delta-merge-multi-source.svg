<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ms" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f472b6"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
  </defs>
  <!-- Three source tables -->
  <rect x="4" y="6" width="20" height="14" rx="2" stroke="url(#ms)" stroke-width="1.5" fill="url(#ms)" fill-opacity=".2"/>
  <text x="14" y="12" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".7">SHIP</text>
  <line x1="4" y1="14" x2="24" y2="14" stroke="url(#ms)" stroke-width=".5" opacity=".4"/>
  <rect x="30" y="6" width="20" height="14" rx="2" stroke="url(#ms)" stroke-width="1.5" fill="url(#ms)" fill-opacity=".2"/>
  <text x="40" y="12" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".7">PAY</text>
  <line x1="30" y1="14" x2="50" y2="14" stroke="url(#ms)" stroke-width=".5" opacity=".4"/>
  <rect x="56" y="6" width="20" height="14" rx="2" stroke="url(#ms)" stroke-width="1.5" fill="url(#ms)" fill-opacity=".2"/>
  <text x="66" y="12" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".7">RTN</text>
  <line x1="56" y1="14" x2="76" y2="14" stroke="url(#ms)" stroke-width=".5" opacity=".4"/>
  <!-- Sequential arrows 1→2→3 -->
  <path d="M14 20L14 30L40 38" stroke="url(#ms)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".7"/>
  <path d="M40 20L40 32L40 38" stroke="url(#ms)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".7"/>
  <path d="M66 20L66 30L40 38" stroke="url(#ms)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".7"/>
  <!-- Sequence numbers -->
  <circle cx="14" cy="25" r="4" fill="url(#ms)" opacity=".3"/>
  <text x="14" y="27" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#ms)" font-weight="bold">1</text>
  <circle cx="40" cy="28" r="4" fill="url(#ms)" opacity=".3"/>
  <text x="40" y="30" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#ms)" font-weight="bold">2</text>
  <circle cx="66" cy="25" r="4" fill="url(#ms)" opacity=".3"/>
  <text x="66" y="27" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#ms)" font-weight="bold">3</text>
  <!-- Merge point -->
  <circle cx="40" cy="40" r="4" fill="url(#ms)" fill-opacity=".4" stroke="url(#ms)" stroke-width="1.5"/>
  <!-- Target table (unified) -->
  <rect x="14" y="48" width="52" height="26" rx="3" stroke="url(#ms)" stroke-width="2" fill="url(#ms)" fill-opacity=".12"/>
  <line x1="14" y1="56" x2="66" y2="56" stroke="url(#ms)" stroke-width="1" opacity=".4"/>
  <path d="M40 44L40 48" stroke="url(#ms)" stroke-width="2" stroke-linecap="round"/>
  <!-- Column sections in target showing data from each source -->
  <rect x="15" y="57" width="16" height="16" rx="1" fill="url(#ms)" fill-opacity=".15"/>
  <rect x="32" y="57" width="16" height="16" rx="1" fill="url(#ms)" fill-opacity=".1"/>
  <rect x="49" y="57" width="16" height="16" rx="1" fill="url(#ms)" fill-opacity=".08"/>
  <text x="23" y="67" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".6">ship</text>
  <text x="40" y="67" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".6">pay</text>
  <text x="57" y="67" text-anchor="middle" font-size="3" font-family="monospace" fill="url(#ms)" opacity=".6">rtn</text>
  <text x="40" y="53" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#ms)" opacity=".7">ORDER STATUS</text>
</svg>
