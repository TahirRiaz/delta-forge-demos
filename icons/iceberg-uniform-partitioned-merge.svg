<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pm" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip -->
  <path d="M40 6L52 26H28Z" fill="url(#pm)" fill-opacity=".2" stroke="url(#pm)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M8 28H72" stroke="url(#pm)" stroke-width="1" opacity=".4" stroke-dasharray="3 2"/>
  <!-- Partitioned table with merge -->
  <rect x="14" y="34" width="52" height="28" rx="3" fill="url(#pm)" fill-opacity=".08" stroke="url(#pm)" stroke-width="1.2"/>
  <!-- Partition dividers -->
  <line x1="32" y1="34" x2="32" y2="62" stroke="url(#pm)" stroke-width="1" opacity=".3"/>
  <line x1="48" y1="34" x2="48" y2="62" stroke="url(#pm)" stroke-width="1" opacity=".3"/>
  <!-- Merge arrows into partitions -->
  <path d="M23 30L23 34" stroke="url(#pm)" stroke-width="1.5" opacity=".6"/>
  <path d="M40 30L40 34" stroke="url(#pm)" stroke-width="1.5" opacity=".6"/>
  <path d="M57 30L57 34" stroke="url(#pm)" stroke-width="1.5" opacity=".6"/>
  <text x="23" y="50" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#pm)" opacity=".5">P1</text>
  <text x="40" y="50" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#pm)" opacity=".5">P2</text>
  <text x="57" y="50" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#pm)" opacity=".5">P3</text>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pm)" opacity=".6">PART MERGE</text>
</svg>
