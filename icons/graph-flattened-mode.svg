  <line x1="60" y1="55" x2="40" y2="70" stroke="url(#gf)" stroke-width="1.5" opacity=".5"/>
  <!-- Nodes as flat rectangles (flattened/tabular) -->
  <rect x="10" y="12" width="20" height="16" rx="3" fill="url(#gf)" fill-opacity=".2" stroke="url(#gf)" stroke-width="1.5"/>
  <line x1="10" y1="20" x2="30" y2="20" stroke="url(#gf)" stroke-width="0.5" opacity=".4"/>
  <rect x="50" y="12" width="20" height="16" rx="3" fill="url(#gf)" fill-opacity=".2" stroke="url(#gf)" stroke-width="1.5"/>
  <line x1="50" y1="20" x2="70" y2="20" stroke="url(#gf)" stroke-width="0.5" opacity=".4"/>
  <rect x="10" y="47" width="20" height="16" rx="3" fill="url(#gf)" fill-opacity=".2" stroke="url(#gf)" stroke-width="1.5"/>
  <line x1="10" y1="55" x2="30" y2="55" stroke="url(#gf)" stroke-width="0.5" opacity=".4"/>
  <rect x="50" y="47" width="20" height="16" rx="3" fill="url(#gf)" fill-opacity=".2" stroke="url(#gf)" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="70" y2="55" stroke="url(#gf)" stroke-width="0.5" opacity=".4"/>
  <rect x="30" y="62" width="20" height="16" rx="3" fill="url(#gf)" fill-opacity=".3" stroke="url(#gf)" stroke-width="1.5"/>
  <line x1="30" y1="70" x2="50" y2="70" stroke="url(#gf)" stroke-width="0.5" opacity=".4"/>
