  <rect x="12" y="34" width="8" height="3" rx="1.5" fill="url(#pb)" opacity=".5"/>
  <rect x="12" y="48" width="8" height="3" rx="1.5" fill="url(#pb)" opacity=".5"/>
  <!-- Person icon -->
  <circle cx="40" cy="32" r="8" fill="url(#pb)" opacity=".35"/>
  <path d="M26 56c0-8 6-14 14-14s14 6 14 14" fill="url(#pb)" opacity=".25"/>
