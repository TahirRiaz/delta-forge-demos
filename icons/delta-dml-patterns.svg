<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="dm" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Table rows -->
  <rect x="12" y="10" width="56" height="8" rx="2" fill="url(#dm)" fill-opacity=".2" stroke="url(#dm)" stroke-width="1"/>
  <rect x="12" y="20" width="56" height="8" rx="2" fill="url(#dm)" fill-opacity=".15" stroke="url(#dm)" stroke-width="1"/>
  <rect x="12" y="30" width="56" height="8" rx="2" fill="url(#dm)" fill-opacity=".2" stroke="url(#dm)" stroke-width="1"/>
  <rect x="12" y="40" width="56" height="8" rx="2" fill="url(#dm)" fill-opacity=".15" stroke="url(#dm)" stroke-width="1"/>
  <!-- DELETE strikethrough on row 2 -->
  <line x1="12" y1="24" x2="68" y2="24" stroke="url(#dm)" stroke-width="1.5" opacity=".7"/>
  <!-- UPDATE arrow on row 3 -->
  <path d="M62 34L72 34" stroke="url(#dm)" stroke-width="1.5" stroke-linecap="round"/>
  <text x="75" y="36" font-size="5" font-family="monospace" fill="url(#dm)" opacity=".7">~</text>
  <!-- Operation labels -->
  <text x="20" y="60" font-size="6" font-family="monospace" fill="url(#dm)" opacity=".7">DEL</text>
  <text x="44" y="60" font-size="6" font-family="monospace" fill="url(#dm)" opacity=".7">UPD</text>
  <!-- WHERE clause indicator -->
  <rect x="14" y="66" width="52" height="8" rx="3" fill="url(#dm)" fill-opacity=".15" stroke="url(#dm)" stroke-width="1" stroke-dasharray="3"/>
  <text x="40" y="72" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#dm)" opacity=".6">WHERE ...</text>
</svg>
