<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="sd" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb7185"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
  </defs>
  <!-- Table with columns -->
  <rect x="12" y="10" width="56" height="40" rx="4" stroke="url(#sd)" stroke-width="1.5" fill="url(#sd)" fill-opacity=".08"/>
  <!-- Column headers -->
  <rect x="14" y="12" width="12" height="8" rx="2" fill="url(#sd)" fill-opacity=".3"/>
  <rect x="28" y="12" width="12" height="8" rx="2" fill="url(#sd)" fill-opacity=".3"/>
  <rect x="42" y="12" width="12" height="8" rx="2" fill="url(#sd)" fill-opacity=".15" stroke="url(#sd)" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="56" y="12" width="10" height="8" rx="2" fill="url(#sd)" fill-opacity=".15" stroke="url(#sd)" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- X marks on dropped columns -->
  <line x1="44" y1="14" x2="52" y2="18" stroke="url(#sd)" stroke-width="1.5" opacity=".7"/>
  <line x1="52" y1="14" x2="44" y2="18" stroke="url(#sd)" stroke-width="1.5" opacity=".7"/>
  <line x1="58" y1="14" x2="64" y2="18" stroke="url(#sd)" stroke-width="1.5" opacity=".7"/>
  <line x1="64" y1="14" x2="58" y2="18" stroke="url(#sd)" stroke-width="1.5" opacity=".7"/>
  <!-- Rows (kept columns solid, dropped columns faded) -->
  <line x1="14" y1="26" x2="38" y2="26" stroke="url(#sd)" stroke-width="1" opacity=".4"/>
  <line x1="14" y1="31" x2="38" y2="31" stroke="url(#sd)" stroke-width="1" opacity=".4"/>
  <line x1="14" y1="36" x2="38" y2="36" stroke="url(#sd)" stroke-width="1" opacity=".4"/>
  <line x1="14" y1="41" x2="38" y2="41" stroke="url(#sd)" stroke-width="1" opacity=".4"/>
  <!-- GDPR shield -->
  <path d="M40 54L52 60V68C52 72 48 76 40 78C32 76 28 72 28 68V60L40 54Z" stroke="url(#sd)" stroke-width="1.5" fill="url(#sd)" fill-opacity=".12"/>
  <text x="40" y="70" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#sd)" opacity=".8">GDPR</text>
</svg>
