<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pr" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Three month partition columns -->
  <rect x="6" y="12" width="18" height="42" rx="3" stroke="url(#pr)" stroke-width="1.5" fill="url(#pr)" fill-opacity=".15"/>
  <rect x="28" y="12" width="18" height="42" rx="3" stroke="url(#pr)" stroke-width="1.5" fill="url(#pr)" fill-opacity=".1" stroke-dasharray="3"/>
  <rect x="50" y="12" width="18" height="42" rx="3" stroke="url(#pr)" stroke-width="1.5" fill="url(#pr)" fill-opacity=".15"/>
  <!-- Data rows in Jan (solid) -->
  <rect x="9" y="16" width="12" height="3" rx="1" fill="url(#pr)" opacity=".5"/>
  <rect x="9" y="22" width="12" height="3" rx="1" fill="url(#pr)" opacity=".4"/>
  <rect x="9" y="28" width="12" height="3" rx="1" fill="url(#pr)" opacity=".5"/>
  <!-- Feb partition: strikethrough (being replaced) -->
  <line x1="28" y1="12" x2="46" y2="54" stroke="url(#pr)" stroke-width="1" opacity=".4"/>
  <line x1="46" y1="12" x2="28" y2="54" stroke="url(#pr)" stroke-width="1" opacity=".4"/>
  <!-- Data rows in Mar (solid) -->
  <rect x="53" y="16" width="12" height="3" rx="1" fill="url(#pr)" opacity=".5"/>
  <rect x="53" y="22" width="12" height="3" rx="1" fill="url(#pr)" opacity=".4"/>
  <rect x="53" y="28" width="12" height="3" rx="1" fill="url(#pr)" opacity=".5"/>
  <!-- Replacement arrow pointing into Feb -->
  <line x1="37" y1="70" x2="37" y2="58" stroke="url(#pr)" stroke-width="2" opacity=".8"/>
  <polyline points="33,62 37,57 41,62" stroke="url(#pr)" stroke-width="1.5" fill="none" opacity=".8"/>
  <!-- New data block coming in -->
  <rect x="31" y="70" width="12" height="4" rx="1" fill="url(#pr)" opacity=".6"/>
  <!-- Month labels -->
  <text x="15" y="50" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pr)" opacity=".7">JAN</text>
  <text x="37" y="50" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pr)" opacity=".6">FEB</text>
  <text x="59" y="50" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pr)" opacity=".7">MAR</text>
</svg>
