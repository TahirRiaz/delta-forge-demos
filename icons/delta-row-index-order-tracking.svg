<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rot" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- truck cab -->
  <rect x="46" y="34" width="18" height="18" rx="2" fill="url(#rot)" opacity=".25" stroke="url(#rot)" stroke-width="1.5"/>
  <!-- truck box -->
  <rect x="14" y="28" width="32" height="24" rx="2" fill="url(#rot)" opacity=".4" stroke="url(#rot)" stroke-width="1.5"/>
  <!-- box label band -->
  <rect x="18" y="34" width="24" height="3" rx="1" fill="url(#rot)" opacity=".7"/>
  <rect x="18" y="40" width="18" height="3" rx="1" fill="url(#rot)" opacity=".5"/>
  <!-- wheels -->
  <circle cx="24" cy="58" r="5" fill="url(#rot)" opacity=".7"/>
  <circle cx="24" cy="58" r="2" fill="#fff" opacity=".4"/>
  <circle cx="56" cy="58" r="5" fill="url(#rot)" opacity=".7"/>
  <circle cx="56" cy="58" r="2" fill="#fff" opacity=".4"/>
  <!-- motion lines -->
  <line x1="6" y1="36" x2="12" y2="36" stroke="url(#rot)" stroke-width="2" stroke-linecap="round" opacity=".6"/>
  <line x1="4" y1="42" x2="12" y2="42" stroke="url(#rot)" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <line x1="8" y1="48" x2="12" y2="48" stroke="url(#rot)" stroke-width="2" stroke-linecap="round" opacity=".5"/>
</svg>
