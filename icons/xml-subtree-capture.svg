<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="xs" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- parent node -->
  <circle cx="24" cy="14" r="5" fill="url(#xs)" opacity=".9"/>
  <!-- branches from parent -->
  <line x1="24" y1="19" x2="14" y2="32" stroke="url(#xs)" stroke-width="1.5" opacity=".6"/>
  <line x1="24" y1="19" x2="34" y2="32" stroke="url(#xs)" stroke-width="1.5" opacity=".6"/>
  <!-- child nodes -->
  <circle cx="14" cy="34" r="3.5" fill="url(#xs)" opacity=".7"/>
  <circle cx="34" cy="34" r="3.5" fill="url(#xs)" opacity=".7"/>
  <!-- grandchild branches -->
  <line x1="14" y1="37.5" x2="8" y2="48" stroke="url(#xs)" stroke-width="1" opacity=".4"/>
  <line x1="14" y1="37.5" x2="20" y2="48" stroke="url(#xs)" stroke-width="1" opacity=".4"/>
  <line x1="34" y1="37.5" x2="28" y2="48" stroke="url(#xs)" stroke-width="1" opacity=".4"/>
  <line x1="34" y1="37.5" x2="40" y2="48" stroke="url(#xs)" stroke-width="1" opacity=".4"/>
  <!-- grandchild nodes -->
  <circle cx="8" cy="50" r="2.5" fill="url(#xs)" opacity=".5"/>
  <circle cx="20" cy="50" r="2.5" fill="url(#xs)" opacity=".5"/>
  <circle cx="28" cy="50" r="2.5" fill="url(#xs)" opacity=".5"/>
  <circle cx="40" cy="50" r="2.5" fill="url(#xs)" opacity=".5"/>
  <!-- capture container (rounded rect with dashed border) -->
  <rect x="48" y="22" width="26" height="46" rx="4" fill="url(#xs)" opacity=".12"/>
  <rect x="48" y="22" width="26" height="46" rx="4" stroke="url(#xs)" stroke-width="1.5" stroke-dasharray="3 2" fill="none" opacity=".6"/>
  <!-- arrow from subtree into container -->
  <path d="M42 40L48 40" stroke="url(#xs)" stroke-width="2" opacity=".7" stroke-linecap="round"/>
  <path d="M45 37L48 40L45 43" stroke="url(#xs)" stroke-width="1.5" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- captured data lines inside container -->
  <line x1="53" y1="32" x2="69" y2="32" stroke="url(#xs)" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <line x1="53" y1="39" x2="66" y2="39" stroke="url(#xs)" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <line x1="53" y1="46" x2="69" y2="46" stroke="url(#xs)" stroke-width="2" stroke-linecap="round" opacity=".35"/>
  <line x1="53" y1="53" x2="64" y2="53" stroke="url(#xs)" stroke-width="2" stroke-linecap="round" opacity=".3"/>
  <line x1="53" y1="60" x2="67" y2="60" stroke="url(#xs)" stroke-width="2" stroke-linecap="round" opacity=".25"/>
  <!-- curly brace hint at top of container -->
  <text x="61" y="28" font-family="monospace" font-size="8" fill="url(#xs)" opacity=".7" text-anchor="middle">{}</text>
</svg>
