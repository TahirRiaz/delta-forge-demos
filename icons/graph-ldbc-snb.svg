<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="ldbcBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ldbcEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="url(#ldbcBg)"/>
  <!-- Dense social network edges (KNOWS graph) -->
  <line x1="60" y1="24" x2="34" y2="42" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="60" y1="24" x2="86" y2="42" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="60" y1="24" x2="60" y2="52" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="34" y1="42" x2="60" y2="52" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="86" y1="42" x2="60" y2="52" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="34" y1="42" x2="22" y2="64" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="34" y1="42" x2="48" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="86" y1="42" x2="98" y2="64" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="86" y1="42" x2="72" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="60" y1="52" x2="48" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="60" y1="52" x2="72" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="22" y1="64" x2="48" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <line x1="98" y1="64" x2="72" y2="68" stroke="url(#ldbcEdge)" stroke-width="1.5"/>
  <!-- Hub node (center, larger) -->
  <circle cx="60" cy="52" r="8" fill="#ffffff" opacity="0.95"/>
  <!-- Primary nodes -->
  <circle cx="60" cy="24" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="34" cy="42" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="86" cy="42" r="6" fill="#ffffff" opacity="0.9"/>
  <!-- Secondary nodes -->
  <circle cx="22" cy="64" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="48" cy="68" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="72" cy="68" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="98" cy="64" r="5" fill="#ffffff" opacity="0.8"/>
  <!-- Hub indicator: star/glow -->
  <circle cx="60" cy="52" r="12" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <!-- LDBC label -->
  <text x="60" y="90" font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="middle" font-weight="bold" letter-spacing="2">LDBC</text>
  <!-- Benchmark subtitle -->
  <text x="60" y="104" font-family="monospace" font-size="7" fill="#e9d5ff" text-anchor="middle" opacity="0.8">1,528 persons</text>
  <text x="60" y="113" font-family="monospace" font-size="7" fill="#e9d5ff" text-anchor="middle" opacity="0.6">14,073 edges</text>
</svg>
