<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="tt" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Clock face -->
  <circle cx="40" cy="36" r="22" stroke="url(#tt)" stroke-width="2" fill="url(#tt)" fill-opacity=".1"/>
  <circle cx="40" cy="36" r="2" fill="url(#tt)" opacity=".8"/>
  <!-- Clock hands -->
  <line x1="40" y1="36" x2="40" y2="20" stroke="url(#tt)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="36" x2="52" y2="32" stroke="url(#tt)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rewind arrow -->
  <path d="M22 18C16 24 14 32 16 40" stroke="url(#tt)" stroke-width="1.5" fill="none"/>
  <path d="M18 16L22 18L20 22" stroke="url(#tt)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Version dots on timeline -->
  <line x1="12" y1="68" x2="68" y2="68" stroke="url(#tt)" stroke-width="1" opacity=".4"/>
  <circle cx="16" cy="68" r="3" fill="url(#tt)" opacity=".3"/>
  <circle cx="29" cy="68" r="3" fill="url(#tt)" opacity=".5"/>
  <circle cx="42" cy="68" r="3" fill="url(#tt)" opacity=".6"/>
  <circle cx="55" cy="68" r="3" fill="url(#tt)" opacity=".8"/>
  <circle cx="68" cy="68" r="3" fill="url(#tt)" opacity="1"/>
  <!-- V0..V4 labels -->
  <text x="16" y="76" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#tt)" opacity=".6">V0</text>
  <text x="68" y="76" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#tt)" opacity=".6">V4</text>
</svg>
