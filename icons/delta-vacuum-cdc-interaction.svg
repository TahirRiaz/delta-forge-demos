<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="vc" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f87171"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>
  <!-- Vacuum broom (left) -->
  <rect x="10" y="12" width="6" height="30" rx="2" fill="url(#vc)" opacity=".4"/>
  <rect x="6" y="38" width="14" height="8" rx="2" fill="url(#vc)" opacity=".3"/>
  <!-- CDC feed (right) -->
  <line x1="56" y1="14" x2="56" y2="46" stroke="url(#vc)" stroke-width="1.5" opacity=".4"/>
  <circle cx="56" cy="18" r="3" fill="url(#vc)" opacity=".5"/>
  <text x="62" y="20" font-size="3.5" font-family="monospace" fill="url(#vc)" opacity=".6">+</text>
  <circle cx="56" cy="28" r="3" fill="url(#vc)" opacity=".5"/>
  <text x="62" y="30" font-size="3.5" font-family="monospace" fill="url(#vc)" opacity=".6">~</text>
  <circle cx="56" cy="38" r="3" fill="url(#vc)" opacity=".5"/>
  <text x="62" y="40" font-size="3.5" font-family="monospace" fill="url(#vc)" opacity=".6">−</text>
  <!-- Intersection symbol -->
  <circle cx="34" cy="30" r="10" stroke="url(#vc)" stroke-width="1.5" fill="url(#vc)" fill-opacity=".1"/>
  <text x="34" y="33" text-anchor="middle" font-size="6" font-family="monospace" fill="url(#vc)" opacity=".7">∩</text>
  <!-- Retention bar -->
  <rect x="8" y="54" width="64" height="8" rx="3" stroke="url(#vc)" stroke-width="1" fill="url(#vc)" fill-opacity=".1"/>
  <rect x="8" y="54" width="40" height="8" rx="3" fill="url(#vc)" fill-opacity=".25"/>
  <text x="28" y="60" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#vc)" opacity=".7">retention</text>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#vc)" opacity=".6">VACUUM+CDC</text>
</svg>
