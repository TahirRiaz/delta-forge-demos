<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="eit" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="40" cy="40" r="24" stroke="url(#eit)" stroke-width="2.5" opacity=".7"/>
  <!-- Latitude lines -->
  <ellipse cx="40" cy="40" rx="24" ry="8" stroke="url(#eit)" stroke-width="1.2" opacity=".35"/>
  <ellipse cx="40" cy="40" rx="24" ry="16" stroke="url(#eit)" stroke-width="1.2" opacity=".35"/>
  <!-- Longitude line -->
  <ellipse cx="40" cy="40" rx="10" ry="24" stroke="url(#eit)" stroke-width="1.2" opacity=".35"/>
  <!-- Meridian -->
  <line x1="40" y1="16" x2="40" y2="64" stroke="url(#eit)" stroke-width="1.2" opacity=".35"/>
  <!-- Trade arrow: top-right outbound -->
  <path d="M52 24L70 12" stroke="url(#eit)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="70,12 64,14 67,18" fill="url(#eit)" opacity=".9"/>
  <!-- Trade arrow: bottom-left inbound -->
  <path d="M28 56L10 68" stroke="url(#eit)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="28,56 22,54 25,58" fill="url(#eit)" opacity=".9"/>
  <!-- Trade arrow: top-left outbound -->
  <path d="M26 28L8 16" stroke="url(#eit)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="8,16 14,18 11,22" fill="url(#eit)" opacity=".9"/>
  <!-- Trade arrow: bottom-right inbound -->
  <path d="M54 52L72 64" stroke="url(#eit)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="54,52 60,50 57,54" fill="url(#eit)" opacity=".9"/>
  <!-- Small document rectangles at arrow endpoints -->
  <rect x="67" y="6" width="8" height="6" rx="1" fill="url(#eit)" opacity=".5"/>
  <rect x="5" y="68" width="8" height="6" rx="1" fill="url(#eit)" opacity=".5"/>
  <rect x="2" y="10" width="8" height="6" rx="1" fill="url(#eit)" opacity=".5"/>
  <rect x="70" y="64" width="8" height="6" rx="1" fill="url(#eit)" opacity=".5"/>
</svg>
