<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="tf" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <!-- Central gear/settings shape -->
  <circle cx="40" cy="34" r="16" stroke="url(#tf)" stroke-width="2" fill="url(#tf)" fill-opacity=".1"/>
  <circle cx="40" cy="34" r="8" stroke="url(#tf)" stroke-width="1.5" fill="url(#tf)" fill-opacity=".2"/>
  <!-- Gear teeth -->
  <rect x="37" y="14" width="6" height="6" rx="1" fill="url(#tf)" opacity=".5"/>
  <rect x="37" y="48" width="6" height="6" rx="1" fill="url(#tf)" opacity=".5"/>
  <rect x="20" y="31" width="6" height="6" rx="1" fill="url(#tf)" opacity=".5"/>
  <rect x="54" y="31" width="6" height="6" rx="1" fill="url(#tf)" opacity=".5"/>
  <!-- Feature toggles -->
  <rect x="14" y="60" width="14" height="6" rx="3" stroke="url(#tf)" stroke-width="1" fill="url(#tf)" fill-opacity=".3"/>
  <circle cx="25" cy="63" r="2.5" fill="url(#tf)" opacity=".8"/>
  <rect x="33" y="60" width="14" height="6" rx="3" stroke="url(#tf)" stroke-width="1" fill="url(#tf)" fill-opacity=".3"/>
  <circle cx="44" cy="63" r="2.5" fill="url(#tf)" opacity=".8"/>
  <rect x="52" y="60" width="14" height="6" rx="3" stroke="url(#tf)" stroke-width="1" fill="url(#tf)" fill-opacity=".15"/>
  <circle cx="55" cy="63" r="2.5" fill="url(#tf)" opacity=".4"/>
  <!-- Labels -->
  <text x="21" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#tf)" opacity=".6">CDC</text>
  <text x="40" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#tf)" opacity=".6">DV</text>
  <text x="59" y="74" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#tf)" opacity=".6">AO</text>
</svg>
