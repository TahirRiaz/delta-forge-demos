<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rcl" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- card background -->
  <rect x="14" y="20" width="52" height="40" rx="4" fill="url(#rcl)" opacity=".15" stroke="url(#rcl)" stroke-width="1.5"/>
  <!-- avatar head -->
  <circle cx="28" cy="36" r="6" fill="url(#rcl)" opacity=".5"/>
  <!-- avatar shoulders -->
  <path d="M20 50 Q20 42 28 42 Q36 42 36 50 Z" fill="url(#rcl)" opacity=".4"/>
  <!-- ID lines -->
  <rect x="42" y="32" width="18" height="3" rx="1" fill="url(#rcl)" opacity=".6"/>
  <rect x="42" y="38" width="14" height="3" rx="1" fill="url(#rcl)" opacity=".4"/>
  <rect x="42" y="44" width="16" height="3" rx="1" fill="url(#rcl)" opacity=".4"/>
  <!-- magnifier -->
  <circle cx="56" cy="60" r="7" fill="none" stroke="url(#rcl)" stroke-width="2"/>
  <line x1="61" y1="65" x2="68" y2="72" stroke="url(#rcl)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
