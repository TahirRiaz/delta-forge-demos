<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ir" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#059669"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Left document (Purchase Order) -->
  <rect x="6" y="14" width="28" height="36" rx="2" stroke="url(#ir)" stroke-width="1.8" fill="url(#ir)" fill-opacity=".1"/>
  <line x1="11" y1="22" x2="29" y2="22" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <line x1="11" y1="26" x2="26" y2="26" stroke="url(#ir)" stroke-width=".8" opacity=".3"/>
  <line x1="11" y1="30" x2="29" y2="30" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <line x1="11" y1="34" x2="24" y2="34" stroke="url(#ir)" stroke-width=".8" opacity=".3"/>
  <line x1="11" y1="38" x2="29" y2="38" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <text x="20" y="19" font-family="sans-serif" font-size="5" fill="url(#ir)" opacity=".6" text-anchor="middle">PO</text>
  <!-- Right document (Invoice) -->
  <rect x="46" y="14" width="28" height="36" rx="2" stroke="url(#ir)" stroke-width="1.8" fill="url(#ir)" fill-opacity=".1"/>
  <line x1="51" y1="22" x2="69" y2="22" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <line x1="51" y1="26" x2="66" y2="26" stroke="url(#ir)" stroke-width=".8" opacity=".3"/>
  <line x1="51" y1="30" x2="69" y2="30" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <line x1="51" y1="34" x2="64" y2="34" stroke="url(#ir)" stroke-width=".8" opacity=".3"/>
  <line x1="51" y1="38" x2="69" y2="38" stroke="url(#ir)" stroke-width=".8" opacity=".4"/>
  <text x="60" y="19" font-family="sans-serif" font-size="5" fill="url(#ir)" opacity=".6" text-anchor="middle">INV</text>
  <!-- Matching arrows between documents -->
  <path d="M34 24L46 24" stroke="url(#ir)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <path d="M42 21L46 24L42 27" stroke="url(#ir)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".5"/>
  <path d="M46 34L34 34" stroke="url(#ir)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <path d="M38 31L34 34L38 37" stroke="url(#ir)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".5"/>
  <!-- Large checkmark below -->
  <path d="M30 60L38 68L52 54" stroke="url(#ir)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity=".7"/>
  <!-- Currency symbol -->
  <text x="40" y="46" font-family="sans-serif" font-size="9" font-weight="bold" fill="url(#ir)" opacity=".3" text-anchor="middle">$</text>
</svg>
