  <path d="M40 14 V66" stroke="url(#etie)" stroke-width="1.2" opacity=".55"/>
  <!-- Loaded wave (filled segments — Nordic seed already present) -->
  <path d="M40 14 a26 26 0 0 1 18.4 7.6 l-5 5 A19 19 0 0 0 40 21 Z" fill="url(#etie)" opacity=".75"/>
  <!-- New wave coming in (incremental arrow + pin) -->
