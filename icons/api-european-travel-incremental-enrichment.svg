<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="etie" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Globe circle -->
  <circle cx="40" cy="40" r="26" fill="url(#etie)" opacity=".18" stroke="url(#etie)" stroke-width="1.5"/>
  <!-- Latitude / longitude lines -->
