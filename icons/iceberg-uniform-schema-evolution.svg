<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="se" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip -->
  <path d="M40 6L52 24H28Z" fill="url(#se)" fill-opacity=".2" stroke="url(#se)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M8 26H72" stroke="url(#se)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Iceberg underwater -->
  <path d="M22 26L18 50L34 62L46 62L62 50L58 26Z" fill="url(#se)" fill-opacity=".08" stroke="url(#se)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Schema columns growing (3 -> 4 -> 5) -->
  <!-- Row 1: 3 columns -->
  <rect x="26" y="32" width="8" height="4" rx="1" fill="url(#se)" opacity=".3"/>
  <rect x="36" y="32" width="8" height="4" rx="1" fill="url(#se)" opacity=".3"/>
  <rect x="46" y="32" width="8" height="4" rx="1" fill="url(#se)" opacity=".3"/>
  <!-- Row 2: 4 columns (evolved) -->
  <rect x="24" y="40" width="8" height="4" rx="1" fill="url(#se)" opacity=".45"/>
  <rect x="34" y="40" width="8" height="4" rx="1" fill="url(#se)" opacity=".45"/>
  <rect x="44" y="40" width="8" height="4" rx="1" fill="url(#se)" opacity=".45"/>
  <rect x="54" y="40" width="6" height="4" rx="1" fill="url(#se)" opacity=".7" stroke="url(#se)" stroke-width=".5"/>
  <!-- Row 3: 5 columns (fully evolved) -->
  <rect x="22" y="48" width="7" height="4" rx="1" fill="url(#se)" opacity=".6"/>
  <rect x="31" y="48" width="7" height="4" rx="1" fill="url(#se)" opacity=".6"/>
  <rect x="40" y="48" width="7" height="4" rx="1" fill="url(#se)" opacity=".6"/>
  <rect x="49" y="48" width="6" height="4" rx="1" fill="url(#se)" opacity=".7"/>
  <rect x="57" y="48" width="5" height="4" rx="1" fill="url(#se)" opacity=".8" stroke="url(#se)" stroke-width=".5"/>
  <!-- Evolution arrow -->
  <path d="M18 34L18 52" stroke="url(#se)" stroke-width="1" opacity=".5"/>
  <path d="M18 52L16 49L20 49Z" fill="url(#se)" opacity=".5"/>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#se)" opacity=".6">SCHEMA</text>
</svg>
