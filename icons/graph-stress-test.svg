<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="st" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Dense mesh edges — chaotic network at scale -->
  <line x1="10" y1="10" x2="30" y2="20" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="10" y1="10" x2="50" y2="15" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="10" y1="10" x2="20" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="30" y1="20" x2="55" y2="25" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="30" y1="20" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="50" y1="15" x2="70" y2="22" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="50" y1="15" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="70" y1="22" x2="65" y2="45" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="70" y1="22" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="20" y1="40" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="20" y1="40" x2="15" y2="60" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="65" y1="45" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="65" y1="45" x2="60" y2="65" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="15" y1="60" x2="35" y2="68" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="15" y1="60" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="60" y1="65" x2="35" y2="68" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="60" y1="65" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <line x1="35" y1="68" x2="40" y2="40" stroke="url(#st)" stroke-width=".7" opacity=".15"/>
  <!-- Extra cross-links for density -->
  <line x1="10" y1="10" x2="70" y2="22" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <line x1="30" y1="20" x2="65" y2="45" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <line x1="20" y1="40" x2="60" y2="65" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <line x1="15" y1="60" x2="70" y2="22" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <line x1="50" y1="15" x2="35" y2="68" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <line x1="10" y1="10" x2="60" y2="65" stroke="url(#st)" stroke-width=".5" opacity=".08"/>
  <!-- Tiny outer nodes (many small = scale) -->
  <circle cx="10" cy="10" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="30" cy="20" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="50" cy="15" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="70" cy="22" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="20" cy="40" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="65" cy="45" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="15" cy="60" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="60" cy="65" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <circle cx="35" cy="68" r="3" fill="url(#st)" fill-opacity=".2" stroke="url(#st)" stroke-width="1"/>
  <!-- Central hub node (larger, brighter) -->
  <circle cx="40" cy="40" r="7" fill="url(#st)" fill-opacity=".4" stroke="url(#st)" stroke-width="2"/>
  <!-- "1M" label inside hub -->
  <text x="40" y="43" text-anchor="middle" fill="url(#st)" font-size="8" font-weight="bold" font-family="system-ui">1M</text>
</svg>
