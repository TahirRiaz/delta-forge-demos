  </defs>
  <!-- Iceberg tip (V2 marker) -->
  <path d="M40 4L52 20H28Z" fill="url(#ne)" fill-opacity=".15" stroke="url(#ne)" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="40" y="16" text-anchor="middle" font-size="6" font-family="monospace" font-weight="bold" fill="url(#ne)" opacity=".9">V2</text>
  <path d="M6 22H74" stroke="url(#ne)" stroke-width="1" opacity=".35" stroke-dasharray="3 2"/>
  <!-- Schema versions stacked -->
  <rect x="14" y="30" width="52" height="8" rx="2" fill="url(#ne)" fill-opacity=".12" stroke="url(#ne)" stroke-width="1"/>
  <rect x="14" y="40" width="52" height="8" rx="2" fill="url(#ne)" fill-opacity=".2" stroke="url(#ne)" stroke-width="1"/>
