  <text x="60" y="47" font-size="6" font-family="monospace" fill="#22c55e" opacity=".7">+</text>
  <!-- Field IDs -->
  <text x="20" y="36" font-size="4" font-family="monospace" fill="url(#ne)" opacity=".5">id:1</text>
  <text x="36" y="36" font-size="4" font-family="monospace" fill="url(#ne)" opacity=".5">id:2</text>
  <text x="20" y="56" font-size="4" font-family="monospace" fill="url(#ne)" opacity=".6">id:1</text>
  <text x="36" y="56" font-size="4" font-family="monospace" fill="url(#ne)" opacity=".6">id:2</text>
  <text x="50" y="56" font-size="4" font-family="monospace" fill="url(#ne)" opacity=".6">id:4</text>
