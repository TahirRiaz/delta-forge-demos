<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="vom" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Phase 1: Fragmented small files (left) -->
  <rect x="4" y="10" width="6" height="8" rx="1" fill="url(#vom)" opacity=".25"/>
  <rect x="12" y="10" width="6" height="8" rx="1" fill="url(#vom)" opacity=".25"/>
  <rect x="4" y="20" width="6" height="8" rx="1" fill="url(#vom)" opacity=".25"/>
  <rect x="12" y="20" width="6" height="8" rx="1" fill="url(#vom)" opacity=".25"/>
  <rect x="4" y="30" width="6" height="8" rx="1" fill="url(#vom)" opacity=".25"/>
  <rect x="12" y="30" width="6" height="8" rx="1" fill="url(#vom)" opacity=".2"/>
  <!-- Arrow 1: OPTIMIZE -->
  <path d="M22 24L30 24" stroke="url(#vom)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <path d="M28 21L31 24L28 27" fill="none" stroke="url(#vom)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <!-- Phase 2: Compacted file + ghost orphans (middle) -->
  <rect x="33" y="12" width="14" height="24" rx="2" fill="url(#vom)" opacity=".5"/>
  <line x1="36" y1="19" x2="44" y2="19" stroke="url(#vom)" stroke-width="1" opacity=".3"/>
  <line x1="36" y1="24" x2="44" y2="24" stroke="url(#vom)" stroke-width="1" opacity=".3"/>
  <line x1="36" y1="29" x2="44" y2="29" stroke="url(#vom)" stroke-width="1" opacity=".3"/>
  <!-- Ghost orphans (dashed) -->
  <rect x="33" y="39" width="6" height="6" rx="1" stroke="url(#vom)" stroke-width="0.8" stroke-dasharray="2 1" fill="none" opacity=".3"/>
  <rect x="41" y="39" width="6" height="6" rx="1" stroke="url(#vom)" stroke-width="0.8" stroke-dasharray="2 1" fill="none" opacity=".3"/>
  <!-- Arrow 2: VACUUM -->
  <path d="M51 24L59 24" stroke="url(#vom)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <path d="M57 21L60 24L57 27" fill="none" stroke="url(#vom)" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
  <!-- Phase 3: Clean compacted file (right) -->
  <rect x="62" y="12" width="14" height="24" rx="2" fill="url(#vom)" opacity=".7"/>
  <line x1="65" y1="19" x2="73" y2="19" stroke="url(#vom)" stroke-width="1" opacity=".4"/>
  <line x1="65" y1="24" x2="73" y2="24" stroke="url(#vom)" stroke-width="1" opacity=".4"/>
  <line x1="65" y1="29" x2="73" y2="29" stroke="url(#vom)" stroke-width="1" opacity=".4"/>
  <!-- Checkmark on clean file -->
  <path d="M66 33L68 36L74 30" stroke="url(#vom)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".8"/>
  <!-- Step labels -->
  <text x="10" y="50" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#vom)" opacity=".5">FRAG</text>
  <text x="40" y="55" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#vom)" opacity=".5">OPTIMIZE</text>
  <text x="69" y="50" text-anchor="middle" font-size="3.5" font-family="monospace" fill="url(#vom)" opacity=".5">CLEAN</text>
  <!-- Bottom label -->
  <text x="40" y="68" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#vom)" opacity=".5">OPTIMIZE</text>
  <text x="40" y="76" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#vom)" opacity=".5">+ VACUUM</text>
</svg>
