<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pbw" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#facc15"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- Star spokes from each corner dim to the central fact -->
  <line x1="22" y1="22" x2="38" y2="38" stroke="url(#pbw)" stroke-width="1.2" opacity=".5"/>
  <line x1="58" y1="22" x2="42" y2="38" stroke="url(#pbw)" stroke-width="1.2" opacity=".5"/>
  <line x1="22" y1="58" x2="38" y2="42" stroke="url(#pbw)" stroke-width="1.2" opacity=".5"/>
  <line x1="58" y1="58" x2="42" y2="42" stroke="url(#pbw)" stroke-width="1.2" opacity=".5"/>
  <!-- Central fact table with bar-chart aggregations inside -->
  <rect x="28" y="28" width="24" height="24" rx="2" fill="url(#pbw)" fill-opacity=".25" stroke="url(#pbw)" stroke-width="1.6"/>
  <rect x="32" y="42" width="3" height="7"  fill="url(#pbw)" opacity=".7"/>
  <rect x="37" y="38" width="3" height="11" fill="url(#pbw)" opacity=".85"/>
  <rect x="42" y="44" width="3" height="5"  fill="url(#pbw)" opacity=".7"/>
  <rect x="47" y="35" width="3" height="14" fill="url(#pbw)" opacity=".95"/>
  <!-- Four dimension tables at the corners, each with a header rule -->
  <rect x="8"  y="8"  width="22" height="14" rx="2" fill="url(#pbw)" fill-opacity=".15" stroke="url(#pbw)" stroke-width="1.4"/>
  <line x1="8"  y1="13" x2="30" y2="13" stroke="url(#pbw)" stroke-width="1" opacity=".5"/>
  <rect x="50" y="8"  width="22" height="14" rx="2" fill="url(#pbw)" fill-opacity=".15" stroke="url(#pbw)" stroke-width="1.4"/>
  <line x1="50" y1="13" x2="72" y2="13" stroke="url(#pbw)" stroke-width="1" opacity=".5"/>
  <rect x="8"  y="58" width="22" height="14" rx="2" fill="url(#pbw)" fill-opacity=".15" stroke="url(#pbw)" stroke-width="1.4"/>
  <line x1="8"  y1="63" x2="30" y2="63" stroke="url(#pbw)" stroke-width="1" opacity=".5"/>
  <rect x="50" y="58" width="22" height="14" rx="2" fill="url(#pbw)" fill-opacity=".15" stroke="url(#pbw)" stroke-width="1.4"/>
  <line x1="50" y1="63" x2="72" y2="63" stroke="url(#pbw)" stroke-width="1" opacity=".5"/>
</svg>
