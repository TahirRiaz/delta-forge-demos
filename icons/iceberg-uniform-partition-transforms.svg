<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="pt" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip -->
  <path d="M40 6L52 26H28Z" fill="url(#pt)" fill-opacity=".2" stroke="url(#pt)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M8 28H72" stroke="url(#pt)" stroke-width="1" opacity=".4" stroke-dasharray="3 2"/>
  <!-- Partition boxes -->
  <rect x="12" y="34" width="16" height="12" rx="2" fill="url(#pt)" fill-opacity=".2" stroke="url(#pt)" stroke-width="1.2"/>
  <rect x="32" y="34" width="16" height="12" rx="2" fill="url(#pt)" fill-opacity=".3" stroke="url(#pt)" stroke-width="1.2"/>
  <rect x="52" y="34" width="16" height="12" rx="2" fill="url(#pt)" fill-opacity=".2" stroke="url(#pt)" stroke-width="1.2"/>
  <!-- Transform function arrow -->
  <path d="M20 50L40 56L60 50" stroke="url(#pt)" stroke-width="1.5" fill="none" opacity=".5"/>
  <text x="40" y="64" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#pt)" opacity=".7">day()</text>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#pt)" opacity=".6">PART TRANSFORMS</text>
</svg>
