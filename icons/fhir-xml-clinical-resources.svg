  <path d="M40 6C40 2 44 -2 44 -2S48 2 48 6C48 8.2 46.2 10 44 10S40 8.2 40 6Z" fill="url(#fxc)" opacity=".8" transform="translate(-4,8)"/>
  <!-- XML document body -->
  <rect x="16" y="18" width="48" height="50" rx="4" stroke="url(#fxc)" stroke-width="1.5" fill="url(#fxc)" fill-opacity=".06"/>
  <!-- XML tag lines showing @value pattern -->
  <!-- <Patient> opening tag -->
  <rect x="22" y="24" width="6" height="2" rx="1" fill="url(#fxc)" opacity=".5"/>
  <rect x="30" y="24" width="16" height="2" rx="1" fill="url(#fxc)" opacity=".35"/>
  <!-- <id value="..."/> -->
  <rect x="26" y="30" width="4" height="2" rx="1" fill="url(#fxc)" opacity=".4"/>
  <rect x="32" y="30" width="10" height="2" rx="1" fill="url(#fxc)" opacity=".25"/>
  <rect x="44" y="30" width="8" height="2" rx="1" fill="url(#fxc)" opacity=".6"/>
  <!-- <gender value="..."/> -->
  <rect x="26" y="36" width="8" height="2" rx="1" fill="url(#fxc)" opacity=".4"/>
  <rect x="36" y="36" width="10" height="2" rx="1" fill="url(#fxc)" opacity=".25"/>
  <rect x="48" y="36" width="6" height="2" rx="1" fill="url(#fxc)" opacity=".6"/>
  <!-- <code><coding>... (deep nesting indicator) -->
  <rect x="26" y="42" width="5" height="2" rx="1" fill="url(#fxc)" opacity=".35"/>
  <rect x="30" y="46" width="5" height="2" rx="1" fill="url(#fxc)" opacity=".3"/>
  <rect x="34" y="50" width="14" height="2" rx="1" fill="url(#fxc)" opacity=".5"/>
  <rect x="50" y="50" width="6" height="2" rx="1" fill="url(#fxc)" opacity=".7"/>
  <!-- @value highlight badge -->
  <rect x="42" y="58" width="18" height="8" rx="4" fill="url(#fxc)" opacity=".2"/>
  <text x="46" y="64" font-family="monospace" font-size="5" fill="url(#fxc)" opacity=".7">@val</text>
  <!-- Medical cross accent (bottom-left) -->
  <rect x="20" y="60" width="8" height="2" rx="1" fill="url(#fxc)" opacity=".35"/>
  <rect x="23" y="57" width="2" height="8" rx="1" fill="url(#fxc)" opacity=".35"/>
</svg>
