<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="fxc" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- XML angle brackets (background motif) -->
  <path d="M12 20L4 32L12 44" stroke="url(#fxc)" stroke-width="2" fill="none" opacity=".15" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 20L76 32L68 44" stroke="url(#fxc)" stroke-width="2" fill="none" opacity=".15" stroke-linecap="round" stroke-linejoin="round"/>
