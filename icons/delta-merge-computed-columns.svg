<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="mcc" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <!-- Source table -->
  <rect x="8" y="10" width="24" height="20" rx="3" stroke="url(#mcc)" stroke-width="1.5" fill="url(#mcc)" fill-opacity=".15"/>
  <line x1="8" y1="17" x2="32" y2="17" stroke="url(#mcc)" stroke-width="1" opacity=".5"/>
  <line x1="8" y1="23" x2="32" y2="23" stroke="url(#mcc)" stroke-width="1" opacity=".3"/>
  <!-- CASE logic block -->
  <rect x="40" y="10" width="32" height="20" rx="3" stroke="url(#mcc)" stroke-width="1.5" fill="url(#mcc)" fill-opacity=".1" stroke-dasharray="3 2"/>
  <text x="56" y="18" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#mcc)" opacity=".7">CASE</text>
  <text x="56" y="26" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#mcc)" opacity=".5">f(x)</text>
  <!-- Merge arrow -->
  <path d="M20 32L40 44" stroke="url(#mcc)" stroke-width="1.5" opacity=".6"/>
  <path d="M56 32L40 44" stroke="url(#mcc)" stroke-width="1.5" opacity=".6"/>
  <circle cx="40" cy="44" r="3.5" fill="url(#mcc)" opacity=".7"/>
  <!-- Result table with derived columns -->
  <rect x="16" y="50" width="48" height="22" rx="3" stroke="url(#mcc)" stroke-width="2" fill="url(#mcc)" fill-opacity=".25"/>
  <line x1="16" y1="57" x2="64" y2="57" stroke="url(#mcc)" stroke-width="1" opacity=".5"/>
  <line x1="16" y1="63" x2="64" y2="63" stroke="url(#mcc)" stroke-width="1" opacity=".3"/>
  <!-- Derived column markers -->
  <circle cx="52" cy="60" r="2" fill="url(#mcc)" opacity=".6"/>
  <circle cx="58" cy="60" r="2" fill="url(#mcc)" opacity=".6"/>
  <circle cx="52" cy="66" r="2" fill="url(#mcc)" opacity=".4"/>
  <circle cx="58" cy="66" r="2" fill="url(#mcc)" opacity=".4"/>
</svg>
