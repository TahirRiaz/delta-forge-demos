<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="cs" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Iceberg tip -->
  <path d="M40 6L52 26H28Z" fill="url(#cs)" fill-opacity=".2" stroke="url(#cs)" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M8 28H72" stroke="url(#cs)" stroke-width="1" opacity=".4" stroke-dasharray="3 2"/>
  <!-- Bar chart for column stats -->
  <rect x="18" y="48" width="8" height="16" rx="1" fill="url(#cs)" fill-opacity=".3"/>
  <rect x="30" y="38" width="8" height="26" rx="1" fill="url(#cs)" fill-opacity=".5"/>
  <rect x="42" y="44" width="8" height="20" rx="1" fill="url(#cs)" fill-opacity=".4"/>
  <rect x="54" y="34" width="8" height="30" rx="1" fill="url(#cs)" fill-opacity=".6"/>
  <!-- Min/Max markers -->
  <line x1="14" y1="34" x2="66" y2="34" stroke="url(#cs)" stroke-width="0.8" opacity=".3" stroke-dasharray="2 2"/>
  <line x1="14" y1="64" x2="66" y2="64" stroke="url(#cs)" stroke-width="0.8" opacity=".3"/>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="4.5" font-family="monospace" fill="url(#cs)" opacity=".6">COL STATS</text>
</svg>
