<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="tt" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Clock face -->
  <circle cx="40" cy="34" r="22" stroke="url(#tt)" stroke-width="2" fill="url(#tt)" fill-opacity=".08"/>
  <!-- Clock hands -->
  <line x1="40" y1="34" x2="40" y2="18" stroke="url(#tt)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="52" y2="30" stroke="url(#tt)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="40" cy="34" r="2" fill="url(#tt)"/>
  <!-- Rewind arrow around clock -->
  <path d="M18 26C14 34 16 44 24 50" stroke="url(#tt)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M15 22L18 26L22 23" stroke="url(#tt)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Version markers -->
  <text x="16" y="68" font-size="5" font-family="monospace" fill="url(#tt)" opacity=".6">V0</text>
  <text x="32" y="68" font-size="5" font-family="monospace" fill="url(#tt)" opacity=".7">V1</text>
  <text x="48" y="68" font-size="5" font-family="monospace" fill="url(#tt)" opacity=".8">V2</text>
  <text x="62" y="68" font-size="5" font-family="monospace" fill="url(#tt)" opacity=".9">V3</text>
  <!-- Timeline -->
  <line x1="14" y1="72" x2="72" y2="72" stroke="url(#tt)" stroke-width="1" opacity=".4"/>
  <circle cx="18" cy="72" r="1.5" fill="url(#tt)" opacity=".6"/>
  <circle cx="34" cy="72" r="1.5" fill="url(#tt)" opacity=".7"/>
  <circle cx="50" cy="72" r="1.5" fill="url(#tt)" opacity=".8"/>
  <circle cx="66" cy="72" r="1.5" fill="url(#tt)" opacity=".9"/>
</svg>
