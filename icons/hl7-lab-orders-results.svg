<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="lr" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Test tube 1 -->
  <rect x="16" y="16" width="12" height="44" rx="6" fill="url(#lr)" opacity=".15"/>
  <rect x="16" y="16" width="12" height="44" rx="6" stroke="url(#lr)" stroke-width="1.5" fill="none"/>
  <!-- Liquid in tube 1 -->
  <rect x="18" y="38" width="8" height="20" rx="4" fill="url(#lr)" opacity=".4"/>
  <!-- Tube 1 cap -->
  <rect x="14" y="12" width="16" height="6" rx="2" fill="url(#lr)" opacity=".3"/>
  <!-- Test tube 2 -->
  <rect x="34" y="12" width="12" height="48" rx="6" fill="url(#lr)" opacity=".15"/>
  <rect x="34" y="12" width="12" height="48" rx="6" stroke="url(#lr)" stroke-width="1.5" fill="none"/>
  <!-- Liquid in tube 2 -->
  <rect x="36" y="32" width="8" height="26" rx="4" fill="url(#lr)" opacity=".5"/>
  <!-- Tube 2 cap -->
  <rect x="32" y="8" width="16" height="6" rx="2" fill="url(#lr)" opacity=".3"/>
  <!-- Results clipboard -->
  <rect x="54" y="20" width="20" height="28" rx="2" fill="url(#lr)" opacity=".2"/>
  <rect x="54" y="20" width="20" height="28" rx="2" stroke="url(#lr)" stroke-width="1.5" fill="none"/>
  <!-- Clipboard clip -->
  <rect x="60" y="16" width="8" height="6" rx="1.5" fill="url(#lr)" opacity=".5"/>
  <!-- Result lines -->
  <line x1="58" y1="30" x2="70" y2="30" stroke="url(#lr)" stroke-width="1" opacity=".35"/>
  <line x1="58" y1="35" x2="70" y2="35" stroke="url(#lr)" stroke-width="1" opacity=".3"/>
  <line x1="58" y1="40" x2="70" y2="40" stroke="url(#lr)" stroke-width="1" opacity=".25"/>
  <!-- Checkmark on clipboard -->
  <path d="M60 43L63 46L68 40" stroke="url(#lr)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".6"/>
  <!-- Arrow: order to result -->
  <path d="M28 68L52 68" stroke="url(#lr)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity=".4"/>
  <path d="M48 64L52 68L48 72" stroke="url(#lr)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity=".4"/>
  <!-- Bubbles in liquid -->
  <circle cx="22" cy="44" r="1.5" fill="url(#lr)" opacity=".3"/>
  <circle cx="40" cy="38" r="1.5" fill="url(#lr)" opacity=".3"/>
  <circle cx="40" cy="50" r="1" fill="url(#lr)" opacity=".25"/>
</svg>
