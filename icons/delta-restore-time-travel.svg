<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="rtt" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Clock face (time travel) -->
  <circle cx="40" cy="30" r="20" stroke="url(#rtt)" stroke-width="2" fill="url(#rtt)" fill-opacity=".06"/>
  <!-- Clock hands -->
  <line x1="40" y1="30" x2="40" y2="16" stroke="url(#rtt)" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="30" x2="50" y2="26" stroke="url(#rtt)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="30" r="2" fill="url(#rtt)"/>
  <!-- Magnifying glass (inspect) -->
  <circle cx="56" cy="42" r="8" stroke="url(#rtt)" stroke-width="1.5" fill="url(#rtt)" fill-opacity=".1"/>
  <line x1="62" y1="48" x2="68" y2="54" stroke="url(#rtt)" stroke-width="2" stroke-linecap="round"/>
  <!-- Restore arrow below -->
  <path d="M20 66A16 16 0 0 1 60 66" stroke="url(#rtt)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <polygon points="20,66 24,60 26,68" fill="url(#rtt)" opacity=".8"/>
  <!-- Version dots on timeline -->
  <circle cx="24" cy="72" r="1.5" fill="url(#rtt)" opacity=".5"/>
  <circle cx="34" cy="72" r="1.5" fill="url(#rtt)" opacity=".6"/>
  <circle cx="44" cy="72" r="1.5" fill="url(#rtt)" opacity=".8"/>
  <circle cx="54" cy="72" r="2" fill="url(#rtt)" opacity="1"/>
  <text x="54" y="78" text-anchor="middle" font-size="4" font-family="monospace" fill="url(#rtt)" opacity=".7">V2</text>
</svg>
