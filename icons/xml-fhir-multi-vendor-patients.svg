<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="fmv" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Three vendor source nodes (left side) representing fhir:, fh:, default xmlns -->
  <circle cx="12" cy="18" r="5" fill="url(#fmv)" opacity=".85"/>
  <circle cx="12" cy="40" r="5" fill="url(#fmv)" opacity=".85"/>
  <circle cx="12" cy="62" r="5" fill="url(#fmv)" opacity=".85"/>
  <!-- Tiny prefix label hints inside each source circle -->
  <text x="12" y="20" font-family="monospace" font-size="5" fill="#fff" opacity=".95" text-anchor="middle">f:</text>
  <text x="12" y="42" font-family="monospace" font-size="5" fill="#fff" opacity=".95" text-anchor="middle">fh</text>
  <text x="12" y="64" font-family="monospace" font-size="4" fill="#fff" opacity=".95" text-anchor="middle">def</text>
  <!-- Converging streams from the three sources to a single resolution node -->
  <path d="M17 18 Q32 22 38 40" stroke="url(#fmv)" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M17 40 L38 40" stroke="url(#fmv)" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <path d="M17 62 Q32 58 38 40" stroke="url(#fmv)" stroke-width="2" fill="none" opacity=".7" stroke-linecap="round"/>
  <!-- Central URI resolver node (the http://hl7.org/fhir URI) -->
  <circle cx="42" cy="40" r="7" fill="url(#fmv)" opacity=".95"/>
  <!-- URI hint inside the resolver -->
  <text x="42" y="42" font-family="monospace" font-size="6" fill="#fff" opacity=".95" text-anchor="middle">URI</text>
  <!-- Single arrow out to the unified table on the right -->
  <path d="M50 40 L60 40" stroke="url(#fmv)" stroke-width="2.5" opacity=".8" stroke-linecap="round"/>
  <path d="M57 36 L60 40 L57 44" stroke="url(#fmv)" stroke-width="2" fill="none" opacity=".8" stroke-linecap="round"/>
  <!-- Unified table (rounded rectangle) on the right with a medical cross to evoke healthcare -->
  <rect x="60" y="22" width="16" height="36" rx="3" fill="url(#fmv)" opacity=".18" stroke="url(#fmv)" stroke-width="1.5"/>
  <!-- Rows in the table -->
  <line x1="62.5" y1="30" x2="73.5" y2="30" stroke="url(#fmv)" stroke-width="1.4" opacity=".55" stroke-linecap="round"/>
  <line x1="62.5" y1="36" x2="73.5" y2="36" stroke="url(#fmv)" stroke-width="1.4" opacity=".5"  stroke-linecap="round"/>
  <line x1="62.5" y1="42" x2="73.5" y2="42" stroke="url(#fmv)" stroke-width="1.4" opacity=".45" stroke-linecap="round"/>
  <line x1="62.5" y1="48" x2="73.5" y2="48" stroke="url(#fmv)" stroke-width="1.4" opacity=".4"  stroke-linecap="round"/>
  <!-- Subtle medical cross above the table to evoke healthcare/HIE -->
  <rect x="65" y="10" width="6" height="2" rx="0.5" fill="url(#fmv)" opacity=".7"/>
  <rect x="67" y="8"  width="2" height="6" rx="0.5" fill="url(#fmv)" opacity=".7"/>
</svg>
