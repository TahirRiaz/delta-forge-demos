  <rect x="17" y="18" width="40" height="48" rx="3" fill="url(#jpbm)" opacity=".25" stroke="url(#jpbm)" stroke-width="1.2"/>
  <rect x="14" y="14" width="40" height="48" rx="3" fill="url(#jpbm)" opacity=".95" stroke="url(#jpbm)" stroke-width="1.4"/>
  <!-- Top page content lines -->
  <path d="M19 24 H45 M19 30 H48 M19 36 H41 M19 42 H47 M19 48 H43 M19 54 H46" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" opacity=".85"/>
