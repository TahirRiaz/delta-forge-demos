<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="gs" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ec4899"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Dense network edges -->
  <line x1="40" y1="12" x2="18" y2="30" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="40" y1="12" x2="62" y2="30" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="40" y1="12" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="18" y1="30" x2="12" y2="52" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="18" y1="30" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="62" y1="30" x2="68" y2="52" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="62" y1="30" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="12" y1="52" x2="28" y2="68" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="12" y1="52" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="68" y1="52" x2="52" y2="68" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="68" y1="52" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="28" y1="68" x2="52" y2="68" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="28" y1="68" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="52" y1="68" x2="40" y2="40" stroke="url(#gs)" stroke-width="1" opacity=".3"/>
  <line x1="18" y1="30" x2="62" y2="30" stroke="url(#gs)" stroke-width="1" opacity=".2"/>
  <line x1="12" y1="52" x2="68" y2="52" stroke="url(#gs)" stroke-width="1" opacity=".2"/>
  <!-- Outer nodes -->
  <circle cx="40" cy="12" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="18" cy="30" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="62" cy="30" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="12" cy="52" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="68" cy="52" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="28" cy="68" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <circle cx="52" cy="68" r="5" fill="url(#gs)" fill-opacity=".2" stroke="url(#gs)" stroke-width="1.5"/>
  <!-- Central hub node (larger) -->
  <circle cx="40" cy="40" r="8" fill="url(#gs)" fill-opacity=".35" stroke="url(#gs)" stroke-width="2"/>
</svg>
