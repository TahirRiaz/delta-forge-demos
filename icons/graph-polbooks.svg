<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="polBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="polEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="16" fill="url(#polBg)"/>
  <!-- Three-community structure: left (liberal/red), center (neutral), right (conservative/blue) -->
  <!-- Cross-community edges -->
  <line x1="34" y1="40" x2="60" y2="36" stroke="#d4d4d8" stroke-width="1" opacity="0.4"/>
  <line x1="86" y1="40" x2="60" y2="36" stroke="#d4d4d8" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="40" x2="60" y2="52" stroke="#d4d4d8" stroke-width="1" opacity="0.3"/>
  <line x1="86" y1="40" x2="60" y2="52" stroke="#d4d4d8" stroke-width="1" opacity="0.3"/>
  <!-- Left community (liberal) -->
  <line x1="34" y1="40" x2="20" y2="28" stroke="#fca5a5" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="40" x2="18" y2="48" stroke="#fca5a5" stroke-width="1.5" opacity="0.7"/>
  <line x1="34" y1="40" x2="26" y2="60" stroke="#fca5a5" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="28" x2="18" y2="48" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="48" x2="26" y2="60" stroke="#fca5a5" stroke-width="1" opacity="0.5"/>
  <!-- Right community (conservative) -->
  <line x1="86" y1="40" x2="100" y2="28" stroke="#93c5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="86" y1="40" x2="102" y2="48" stroke="#93c5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="86" y1="40" x2="94" y2="60" stroke="#93c5fd" stroke-width="1.5" opacity="0.7"/>
  <line x1="100" y1="28" x2="102" y2="48" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>
  <line x1="102" y1="48" x2="94" y2="60" stroke="#93c5fd" stroke-width="1" opacity="0.5"/>
  <!-- Center community (neutral) -->
  <line x1="60" y1="36" x2="60" y2="52" stroke="#d4d4d8" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="36" x2="50" y2="28" stroke="#d4d4d8" stroke-width="1" opacity="0.5"/>
  <line x1="60" y1="36" x2="70" y2="28" stroke="#d4d4d8" stroke-width="1" opacity="0.5"/>
  <!-- Community hubs -->
  <circle cx="34" cy="40" r="7" fill="#fca5a5" opacity="0.9"/>
  <circle cx="60" cy="36" r="6" fill="#d4d4d8" opacity="0.9"/>
  <circle cx="86" cy="40" r="7" fill="#93c5fd" opacity="0.9"/>
  <!-- Left members -->
  <circle cx="20" cy="28" r="4" fill="#fca5a5" opacity="0.7"/>
  <circle cx="18" cy="48" r="4" fill="#fca5a5" opacity="0.7"/>
  <circle cx="26" cy="60" r="4" fill="#fca5a5" opacity="0.7"/>
  <!-- Right members -->
  <circle cx="100" cy="28" r="4" fill="#93c5fd" opacity="0.7"/>
  <circle cx="102" cy="48" r="4" fill="#93c5fd" opacity="0.7"/>
  <circle cx="94" cy="60" r="4" fill="#93c5fd" opacity="0.7"/>
  <!-- Center members -->
  <circle cx="60" cy="52" r="4" fill="#d4d4d8" opacity="0.7"/>
  <circle cx="50" cy="28" r="4" fill="#d4d4d8" opacity="0.7"/>
  <circle cx="70" cy="28" r="4" fill="#d4d4d8" opacity="0.7"/>
  <!-- Label -->
  <text x="60" y="80" font-family="sans-serif" font-size="10" fill="#fde68a" text-anchor="middle" font-weight="bold" letter-spacing="1">POLBOOKS</text>
  <text x="60" y="93" font-family="monospace" font-size="7" fill="#e2e8f0" text-anchor="middle" opacity="0.8">105 books</text>
  <text x="60" y="102" font-family="monospace" font-size="7" fill="#e2e8f0" text-anchor="middle" opacity="0.6">441 edges / 3 groups</text>
</svg>
