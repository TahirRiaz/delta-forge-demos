  <circle cx="14" cy="16" r="3" fill="url(#zo)" opacity=".8"/>
  <circle cx="36" cy="16" r="3" fill="url(#zo)" opacity=".6"/>
  <circle cx="58" cy="16" r="3" fill="url(#zo)" opacity=".8"/>
  <circle cx="36" cy="34" r="3" fill="url(#zo)" opacity=".5"/>
  <circle cx="14" cy="52" r="3" fill="url(#zo)" opacity=".8"/>
  <circle cx="36" cy="52" r="3" fill="url(#zo)" opacity=".6"/>
  <circle cx="58" cy="52" r="3" fill="url(#zo)" opacity=".8"/>
  <!-- File icons at bottom -->
  <rect x="10" y="62" width="12" height="10" rx="2" stroke="url(#zo)" stroke-width="1" fill="url(#zo)" fill-opacity=".2"/>
  <rect x="26" y="62" width="12" height="10" rx="2" stroke="url(#zo)" stroke-width="1" fill="url(#zo)" fill-opacity=".15"/>
  <rect x="42" y="62" width="12" height="10" rx="2" stroke="url(#zo)" stroke-width="1" fill="url(#zo)" fill-opacity=".25"/>
  <rect x="58" y="62" width="12" height="10" rx="2" stroke="url(#zo)" stroke-width="1" fill="url(#zo)" fill-opacity=".2"/>
