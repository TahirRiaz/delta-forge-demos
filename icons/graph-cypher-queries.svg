<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="cypherBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cypherEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="url(#cypherBg)"/>
  <!-- Graph edges -->
  <line x1="40" y1="32" x2="80" y2="32" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="32" x2="28" y2="68" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="32" x2="28" y2="68" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="68" x2="72" y2="68" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="68" x2="92" y2="48" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92" y1="48" x2="40" y2="32" stroke="url(#cypherEdge)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4,3"/>
  <!-- Arrow heads on some edges -->
  <polygon points="76,32 72,29 72,35" fill="#c7d2fe" opacity="0.9"/>
  <polygon points="32,65 25,66 29,72" fill="#c7d2fe" opacity="0.9"/>
  <!-- Graph nodes -->
  <circle cx="40" cy="32" r="7" fill="#ffffff" opacity="0.95"/>
  <circle cx="80" cy="32" r="7" fill="#ffffff" opacity="0.95"/>
  <circle cx="28" cy="68" r="7" fill="#ffffff" opacity="0.95"/>
  <circle cx="72" cy="68" r="7" fill="#ffffff" opacity="0.95"/>
  <circle cx="92" cy="48" r="7" fill="#ffffff" opacity="0.95"/>
  <!-- Node labels -->
  <text x="40" y="35" font-family="monospace" font-size="8" fill="#4338ca" text-anchor="middle" font-weight="bold">A</text>
  <text x="80" y="35" font-family="monospace" font-size="8" fill="#4338ca" text-anchor="middle" font-weight="bold">B</text>
  <text x="28" y="71" font-family="monospace" font-size="8" fill="#4338ca" text-anchor="middle" font-weight="bold">C</text>
  <text x="72" y="71" font-family="monospace" font-size="8" fill="#4338ca" text-anchor="middle" font-weight="bold">D</text>
  <text x="92" y="51" font-family="monospace" font-size="8" fill="#4338ca" text-anchor="middle" font-weight="bold">E</text>
  <!-- Cypher query text -->
  <text x="60" y="94" font-family="monospace" font-size="9" fill="#e0e7ff" text-anchor="middle" opacity="0.9">MATCH (n)-[r]-&gt;(m)</text>
  <text x="60" y="106" font-family="monospace" font-size="9" fill="#c7d2fe" text-anchor="middle" opacity="0.7">RETURN n, m</text>
</svg>
