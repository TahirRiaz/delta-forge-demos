<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="etrc" x1="0" y1="80" x2="80" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <!-- Globe outline (Europe-ish profile suggested by the meridians) -->
  <circle cx="40" cy="40" r="26" fill="url(#etrc)" opacity=".18" stroke="url(#etrc)" stroke-width="1.8"/>
  <!-- Equator -->
  <ellipse cx="40" cy="40" rx="26" ry="9" fill="none" stroke="url(#etrc)" stroke-width="1.2" opacity=".55"/>
  <!-- Vertical meridian -->
  <ellipse cx="40" cy="40" rx="9" ry="26" fill="none" stroke="url(#etrc)" stroke-width="1.2" opacity=".55"/>
  <!-- Off-axis meridian (gives the impression of rotation / northern hemisphere) -->
  <ellipse cx="40" cy="40" rx="20" ry="26" fill="none" stroke="url(#etrc)" stroke-width="1.0" opacity=".35" transform="rotate(20 40 40)"/>
  <!-- Map pin marking a European location -->
  <path d="M52 24 C52 20 48.5 17 45 17 C41.5 17 38 20 38 24 C38 28 45 36 45 36 C45 36 52 28 52 24 Z"
        fill="url(#etrc)" opacity=".85"/>
  <circle cx="45" cy="24" r="2.5" fill="#0b1220"/>
</svg>
