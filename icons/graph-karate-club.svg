<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="karateBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="karateEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#fca5a5;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="120" height="120" rx="16" fill="url(#karateBg)"/>
  <!-- Two-faction network: left cluster (instructor) and right cluster (president) -->
  <!-- Cross-faction edges -->
  <line x1="38" y1="44" x2="82" y2="44" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="38" y1="44" x2="72" y2="56" stroke="url(#karateEdge)" stroke-width="1"/>
  <line x1="82" y1="44" x2="48" y2="56" stroke="url(#karateEdge)" stroke-width="1"/>
  <!-- Left faction edges (instructor node 0) -->
  <line x1="38" y1="44" x2="22" y2="28" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="38" y1="44" x2="20" y2="50" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="38" y1="44" x2="28" y2="64" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="38" y1="44" x2="48" y2="56" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="22" y1="28" x2="20" y2="50" stroke="url(#karateEdge)" stroke-width="1"/>
  <line x1="20" y1="50" x2="28" y2="64" stroke="url(#karateEdge)" stroke-width="1"/>
  <line x1="48" y1="56" x2="28" y2="64" stroke="url(#karateEdge)" stroke-width="1"/>
  <!-- Right faction edges (president node 33) -->
  <line x1="82" y1="44" x2="98" y2="28" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="82" y1="44" x2="100" y2="50" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="82" y1="44" x2="92" y2="64" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="82" y1="44" x2="72" y2="56" stroke="url(#karateEdge)" stroke-width="1.5"/>
  <line x1="98" y1="28" x2="100" y2="50" stroke="url(#karateEdge)" stroke-width="1"/>
  <line x1="100" y1="50" x2="92" y2="64" stroke="url(#karateEdge)" stroke-width="1"/>
  <line x1="72" y1="56" x2="92" y2="64" stroke="url(#karateEdge)" stroke-width="1"/>
  <!-- Left faction hub (instructor) -->
  <circle cx="38" cy="44" r="8" fill="#ffffff" opacity="0.95"/>
  <!-- Right faction hub (president) -->
  <circle cx="82" cy="44" r="8" fill="#ffffff" opacity="0.95"/>
  <!-- Left faction members -->
  <circle cx="22" cy="28" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="20" cy="50" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="28" cy="64" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="48" cy="56" r="5" fill="#ffffff" opacity="0.8"/>
  <!-- Right faction members -->
  <circle cx="98" cy="28" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="100" cy="50" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="92" cy="64" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="72" cy="56" r="5" fill="#ffffff" opacity="0.8"/>
  <!-- Faction split indicator -->
  <line x1="60" y1="18" x2="60" y2="72" stroke="#fde68a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <!-- Label -->
  <text x="60" y="88" font-family="sans-serif" font-size="11" fill="#fde68a" text-anchor="middle" font-weight="bold" letter-spacing="1">KARATE</text>
  <text x="60" y="101" font-family="monospace" font-size="7" fill="#fed7aa" text-anchor="middle" opacity="0.8">34 members</text>
  <text x="60" y="110" font-family="monospace" font-size="7" fill="#fed7aa" text-anchor="middle" opacity="0.6">78 edges</text>
</svg>
