<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="ue" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f97316"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- Globe outline -->
  <circle cx="40" cy="36" r="22" stroke="url(#ue)" stroke-width="2" fill="url(#ue)" fill-opacity=".08"/>
  <ellipse cx="40" cy="36" rx="10" ry="22" stroke="url(#ue)" stroke-width="1" fill="none" opacity=".4"/>
  <line x1="18" y1="30" x2="62" y2="30" stroke="url(#ue)" stroke-width="1" opacity=".3"/>
  <line x1="18" y1="42" x2="62" y2="42" stroke="url(#ue)" stroke-width="1" opacity=".3"/>
  <!-- Script labels around globe -->
  <text x="20" y="22" font-size="8" font-family="serif" fill="url(#ue)" opacity=".8">あ</text>
  <text x="54" y="22" font-size="8" font-family="serif" fill="url(#ue)" opacity=".8">ü</text>
  <text x="16" y="50" font-size="8" font-family="serif" fill="url(#ue)" opacity=".8">ع</text>
  <text x="56" y="50" font-size="8" font-family="serif" fill="url(#ue)" opacity=".8">한</text>
  <!-- UTF-8 label -->
  <rect x="20" y="62" width="40" height="12" rx="3" stroke="url(#ue)" stroke-width="1" fill="url(#ue)" fill-opacity=".15"/>
  <text x="40" y="71" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#ue)" opacity=".8">UTF-8</text>
</svg>
