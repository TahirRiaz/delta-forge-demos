<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="dp" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Calculator display -->
  <rect x="14" y="10" width="52" height="28" rx="4" stroke="url(#dp)" stroke-width="2" fill="url(#dp)" fill-opacity=".1"/>
  <!-- Decimal number display -->
  <text x="40" y="22" text-anchor="middle" font-size="7" font-family="monospace" fill="url(#dp)" opacity=".8">3.14159265</text>
  <text x="40" y="32" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#dp)" opacity=".6">DECIMAL(18,8)</text>
  <!-- Precision scale bars -->
  <rect x="14" y="44" width="24" height="6" rx="2" fill="url(#dp)" fill-opacity=".3"/>
  <rect x="14" y="44" width="16" height="6" rx="2" fill="url(#dp)" fill-opacity=".5"/>
  <rect x="42" y="44" width="24" height="6" rx="2" fill="url(#dp)" fill-opacity=".3"/>
  <rect x="42" y="44" width="20" height="6" rx="2" fill="url(#dp)" fill-opacity=".5"/>
  <!-- Equals sign -->
  <line x1="30" y1="58" x2="50" y2="58" stroke="url(#dp)" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="63" x2="50" y2="63" stroke="url(#dp)" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="40" y="76" text-anchor="middle" font-size="5" font-family="monospace" fill="url(#dp)" opacity=".6">PRECISION</text>
</svg>
