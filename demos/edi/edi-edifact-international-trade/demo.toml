[demo]
id = "edi-edifact-international-trade"
name = "EDI EDIFACT International Trade"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates UN/EDIFACT and EANCOM message parsing across 22 files covering \
international trade, logistics, customs, and passenger data. Message types \
span the full trade lifecycle: purchase orders (ORDERS), invoices (INVOIC), \
order responses (ORDRSP), freight forwarding (IFCSUM), customs cargo reports \
(CUSCAR), bayplan stowage (BAPLIE), passenger lists (PAXLST/PNRGOV), despatch \
advice (DESADV), transport status (IFTSTA), price catalogues (PRICAT), and \
acknowledgments (APERAK/CONTRL). Covers multiple UN/EDIFACT directory versions \
(D:96A, D:01B, D:03B, D:95B, D:10A, D:13B, D:00B) and six syntax identifiers \
(UNOA, UNOB, UNOC, UNOL, IATB, IATA). Two tables: a compact header view and \
a materialized extraction of key trade fields (BGM, NAD, DTM, LIN).
"""
categories = ["edi", "edifact", "international-trade"]
tags = ["edi", "edifact", "eancom", "international-trade", "logistics", "customs", "advanced", "multi-file"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing EDIFACT .edi files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

# --- EDIFACT files (16) ---

[[demo.data_files]]
path = "data/edifact_ORDERS_purchase_order.edi"
format = "edi"
description = "EDIFACT ORDERS — Purchase order (D:96A:UN), BGM/NAD/LIN segments"
size_bytes = 833

