[demo]
id = "edi-supply-chain-x12"
name = "EDI Supply Chain X12 — Order-to-Cash Lifecycle"
version = "1.0.0"
author = "DeltaForge Team"
description = """\
Demonstrates how DeltaForge ingests X12 EDI transactions spanning the \
full supply chain order-to-cash lifecycle. Fourteen real-world transactions \
cover purchase orders (850), invoices (810), PO acknowledgments (855), \
ship notices (856/857), receiving advice (861), functional acknowledgments \
(997), and application advice (824). Sources span multiple trading partners \
across X12 versions 00401 and 00204 — showing how a single external table \
unifies heterogeneous EDI feeds into queryable transaction data with \
envelope headers, materialized business fields, and full JSON output.
"""
categories = ["edi", "supply-chain"]
tags = ["edi", "x12", "supply-chain", "purchase-order", "invoice", "shipping", "850", "810", "856", "997", "trading-partners"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/x12_850_purchase_order.edi"
format = "edi"
description = "850 Purchase Order — Simple PO (000123456, v00401): 1 line item, ship-to John Doe, UPS Ground"
size_bytes = 389

[[demo.data_files]]
path = "data/x12_850_purchase_order_a.edi"
format = "edi"
description = "850 Purchase Order — Complex PO (000123456, v00401): 3 textile line items, multiple N1 parties, international shipping"
size_bytes = 1760

[[demo.data_files]]
path = "data/x12_850_purchase_order_edifabric.edi"
format = "edi"
description = "850 Purchase Order — Aerospace PO (SENDER1, v00204): defense parts, tax info, scheduled delivery"
size_bytes = 529

[[demo.data_files]]
path = "data/x12_810_invoice_a.edi"
format = "edi"
description = "810 Invoice — Music supply invoice (ABCMUSICSUPPLY, v00401): 2 line items, payment terms, remit-to bank"
size_bytes = 2255

[[demo.data_files]]
path = "data/x12_810_invoice_b.edi"
format = "edi"
description = "810 Invoice — Music supply invoice with tax (ABCMUSICSUPPLY, v00401): state and federal tax detail per line"
size_bytes = 2564

[[demo.data_files]]
path = "data/x12_810_invoice_c.edi"
format = "edi"
description = "810 Invoice — Header-level invoice (ABCMUSICSUPPLY, v00401): 1 consolidated line item, allowances and charges"
size_bytes = 1512

[[demo.data_files]]
path = "data/x12_810_invoice_d.edi"
format = "edi"
description = "810 Invoice — Multi-line header invoice (ABCMUSICSUPPLY, v00401): 2 line items with individual delivery dates"
size_bytes = 2205

[[demo.data_files]]
path = "data/x12_810_invoice_edifabric.edi"
format = "edi"
description = "810 Invoice — Aerospace invoice (SENDER1, v00204): simple 1-line invoice, ship-to ABC Aerospace"
size_bytes = 437

[[demo.data_files]]
path = "data/x12_855_purchase_order_ack.edi"
format = "edi"
description = "855 PO Acknowledgment — Order confirmation (SENDER1, v00204): 3 line items, ship-from XYZ Manufacturing to Kohls"
size_bytes = 532

[[demo.data_files]]
path = "data/x12_856_ship_notice.edi"
format = "edi"
description = "856 Ship Notice — Advance ship notice (SENDER1, v00204): hierarchical levels (shipment/order/pack/item), Wal-Mart DC"
size_bytes = 1037

[[demo.data_files]]
path = "data/x12_856_ship_bill_notice.edi"
format = "edi"
description = "857 Shipment & Billing Notice — Combined ship/bill (SENDER1, v00204): pricing with discounts, multiple items"
size_bytes = 607

[[demo.data_files]]
path = "data/x12_861_receiving_advice.edi"
format = "edi"
description = "861 Receiving Advice — Receipt confirmation (SENDER1, v00204): quantity received, part number, acceptance code"
size_bytes = 370

[[demo.data_files]]
path = "data/x12_997_functional_acknowledgment.edi"
format = "edi"
description = "997 Functional Acknowledgment — EDI acknowledgment (TO->FROM, v00401): accepts 1, rejects 1 of 2 transaction sets"
size_bytes = 318

[[demo.data_files]]
path = "data/x12_824_application_advice.edi"
format = "edi"
description = "824 Application Advice — Error notification (SENDER1, v00204): invalid part/plant/supplier combination error"
size_bytes = 581

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi_demos.supply_chain_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi_demos.supply_chain_materialized"
