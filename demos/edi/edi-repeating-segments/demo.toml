[demo]
id = "edi-repeating-segments"
name = "EDI Repeating Segments — Multi-Occurrence X12 Handling"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates Delta Forge's three strategies for handling repeating X12 \
segments — Indexed, Concatenate, and ToJson. When EDI transactions contain \
multiple occurrences of the same segment (e.g., multiple N1 party loops or \
multiple PO1 line items), the engine can: (1) fan out each occurrence into \
separate numbered columns (Indexed), (2) pipe-delimit all values into a \
single column (Concatenate), or (3) produce a JSON array per column (ToJson). \
Fourteen real-world X12 files covering 850s, 810s, 855s, 856s, 861, 997, \
and 824 transactions exercise all three modes against N1 party names and \
PO1 line-item data — proving that multi-occurrence segments are now fully \
queryable without falling back to df_transaction_json.
"""
categories = ["edi", "supply-chain"]
tags = ["edi", "x12", "repeating-segments", "indexed", "concatenate", "to-json", "multi-occurrence", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/x12_810_invoice_a.edi"
format = "edi"
description = "810 Invoice — Music supply invoice (ABCMUSICSUPPLY, v00401): 6 N1 parties, 2 line items"
size_bytes = 2255

