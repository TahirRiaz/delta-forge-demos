[demo]
id = "edi-tradacoms-uk-retail"
name = "EDI TRADACOMS UK Retail — Orders, Planning & Utilities"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates how Delta Forge ingests TRADACOMS — the UK-specific EDI standard \
used predominantly in retail and utilities. Four files cover purchase orders, \
product planning forecasts, and utility bills, including escape character \
handling for special characters in trading partner names. Each TRADACOMS file \
contains multiple MHD (Message Header) segments; Delta Forge produces one row \
per message, enabling granular analysis of order lines, billing details, and \
forecast data within a single SQL query.
"""
categories = ["edi", "tradacoms", "uk-retail"]
tags = ["edi", "tradacoms", "uk-retail", "purchase-order", "product-planning", "utility-bill", "escape-characters", "multi-message"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing TRADACOMS .edi files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/tradacoms_order.edi"
format = "edi"
description = "TRADACOMS purchase order — 4 MHD segments: ORDHDR:9, ORDERS:9 (x2), ORDTLR:9. Sender=ANY SHOP PLC, Receiver=XYZ MANUFACTURING PLC"
size_bytes = 747

[[demo.data_files]]
path = "data/tradacoms_product_planning.edi"
format = "edi"
description = "TRADACOMS product planning forecast — 3 MHD segments: PPRHDR:2, PPRDET:2, PPRTLR:2. EAN-coded trading partners"
size_bytes = 969

[[demo.data_files]]
path = "data/tradacoms_utility_bill.edi"
format = "edi"
description = "TRADACOMS utility bill — 4 MHD segments: UTLHDR:3, UTLBIL:3, UVATLR:3, UTLTLR:3. Sender=SOME ELECTRIC COMPANY PLC"
size_bytes = 1246

[[demo.data_files]]
path = "data/tradacoms_utility_bill_escape.edi"
format = "edi"
description = "TRADACOMS utility bill with escape characters — ?' and ?+ in customer name (GEORGE'S FRIED CHIKEN + SONS)"
size_bytes = 1298

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi_demos.tradacoms_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi_demos.tradacoms_materialized"
