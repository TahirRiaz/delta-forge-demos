description = "X12 832 — Price/Sales Catalog: BISG book catalog with ISBN, descriptions, and pricing (v00204, GS=IN)"
size_bytes = 653

[[demo.data_files]]
path = "data/x12_832_price_sales_catalog.edi"
format = "edi"
description = "X12 832 — Price/Sales Catalog: multi-line publisher catalog with 2 ISBN items (v00401, GS=SC)"
size_bytes = 788

[[demo.data_files]]
path = "data/x12_940_warehouse_shipping_advice.edi"
format = "edi"
