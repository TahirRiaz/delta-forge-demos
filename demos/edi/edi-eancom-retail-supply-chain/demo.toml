[demo]
id = "edi-eancom-retail-supply-chain"
name = "EANCOM Retail Supply Chain"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
European retailer's EDI hub processing GS1/EANCOM messages across the retail \
supply chain. Covers despatch advices (DESADV) for warehouse receiving, invoices \
(INVOIC) for accounts payable, order responses (ORDRSP) for procurement, price \
catalogues (PRICAT) for product master data, transport status (IFTSTA) for \
shipment tracking, and transport instructions (IFTMIN) for carrier booking. \
EANCOM is the GS1 subset of EDIFACT used by major European retailers (Tesco, \
Carrefour, REWE) — same syntax as EDIFACT but with GS1 association codes and \
EAN/GTIN article numbering. Demonstrates materialized_paths for BGM document \
codes, NAD trading partner identification, LIN product lines with GTINs, \
and STS shipment status tracking."""
categories = ["edi", "edifact", "retail"]
tags = ["edi", "eancom", "gs1", "retail", "supply-chain", "gtin", "intermediate"]
difficulty = "intermediate"
estimated_time_minutes = 7

[demo.variables]
data_path = { description = "Path to directory containing EANCOM .edi files", required = true }
zone_name = { description = "Target zone name", required = false }

[[demo.data_files]]
path = "data/eancom_DESADV_despatch_advice.edi"
format = "edi"
description = "EANCOM DESADV — Despatch advice (D:96A:UN:EAN007), BGM/NAD/CPS/LIN segments"
size_bytes = 805

[[demo.data_files]]
path = "data/eancom_IFTSTA_transport_status.edi"
format = "edi"
description = "EANCOM IFTSTA — Transport status (D:96A:UN:EAN004), BGM/NAD/CNI/STS segments"
size_bytes = 706

[[demo.data_files]]
path = "data/eancom_INVOIC_invoice.edi"
format = "edi"
description = "EANCOM INVOIC — Invoice (D:01B:UN:EAN011), BGM/NAD/LIN/TAX/MOA segments"
size_bytes = 977

[[demo.data_files]]
path = "data/eancom_ORDRSP_order_response.edi"
format = "edi"
description = "EANCOM ORDRSP — Order response (D:96A:UN:EAN009), BGM/NAD/LIN segments"
size_bytes = 565

[[demo.data_files]]
path = "data/eancom_PRICAT_price_catalogue.edi"
format = "edi"
description = "EANCOM PRICAT — Price catalogue (D:96A:UN:EAN009), BGM/NAD/LIN/PRI segments"
size_bytes = 1016

[[demo.data_files]]
path = "data/eancom_instruction.edi"
format = "edi"
description = "EANCOM IFTMIN — Transport instruction (D:96A:UN:EAN004), BGM/NAD/GID/TMP segments"
size_bytes = 540

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.eancom_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.eancom_materialized"
