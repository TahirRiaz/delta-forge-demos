[demo]
id = "edi-hipaa-healthcare"
name = "EDI HIPAA Healthcare — Claims Lifecycle"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates how Delta Forge ingests HIPAA X12 healthcare EDI transactions \
covering the complete claims lifecycle. Eleven real-world transactions span \
eligibility verification (270/271), claim status inquiry (276/277), healthcare \
claims (837 professional, dental, institutional), payment and remittance \
(835/820), benefit enrollment (834), and prior authorization (278). All files \
use HIPAA 5010 (ISA-12 = 00501) with their respective implementation guide \
versions — showing how a single external table unifies heterogeneous HIPAA \
transaction feeds into queryable data.
"""
categories = ["edi", "healthcare", "hipaa"]
tags = ["edi", "x12", "hipaa", "healthcare", "claims", "eligibility", "payment", "remittance", "enrollment", "5010"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing HIPAA X12 EDI transaction files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/hipaa_270_eligibility_request.edi"
format = "edi"
description = "270 — Eligibility inquiry (GS=HC, guide=005010X279A1): BHT/NM1/HL segments for patient eligibility check"
size_bytes = 503

[[demo.data_files]]
path = "data/hipaa_271_eligibility_response.edi"
format = "edi"
description = "271 — Eligibility response (GS=HC, guide=005010X279A1): BHT/NM1/EB segments with benefit details"
size_bytes = 805

[[demo.data_files]]
path = "data/hipaa_276_claim_status_request.edi"
format = "edi"
description = "276 — Claim status request (GS=HC, guide=005010X212): BHT/NM1/TRN/SVC segments for status inquiry"
size_bytes = 975

[[demo.data_files]]
path = "data/hipaa_277_claim_status_response.edi"
format = "edi"
description = "277 — Claim status response (GS=HC, guide=005010X212): BHT/NM1/STC/SVC segments with status codes"
size_bytes = 1064

[[demo.data_files]]
path = "data/hipaa_278_services_review.edi"
format = "edi"
description = "278 — Health services review / prior authorization (GS=HC, guide=005010X217): BHT/NM1/UM/HI segments"
size_bytes = 590

[[demo.data_files]]
path = "data/hipaa_820_payment.edi"
format = "edi"
description = "835 — Claim payment/remittance (GS=HC, guide=005010X221A1): BPR/TRN/CLP/SVC payment details (file named 820)"
size_bytes = 800

[[demo.data_files]]
path = "data/hipaa_820_payment_order.edi"
format = "edi"
description = "820 — Payment order (GS=HC, guide=005010X218): BPR/TRN/RMR premium payment instructions"
size_bytes = 561

[[demo.data_files]]
path = "data/hipaa_834_benefit_enrollment.edi"
format = "edi"
description = "834 — Benefit enrollment (GS=BE, guide=005010X220A1): BGN/INS/NM1/HD member enrollment and maintenance"
size_bytes = 678

[[demo.data_files]]
path = "data/hipaa_835_claim_payment.edi"
format = "edi"
description = "837 — Healthcare claim professional (GS=HC, guide=005010X222A1): BHT/NM1/CLM/SV1 claim submission (file named 835)"
size_bytes = 1151

[[demo.data_files]]
path = "data/hipaa_837D_dental_claim.edi"
format = "edi"
description = "837 — Healthcare claim dental (GS=HC, guide=005010X224A2): BHT/NM1/CLM/SV3 dental claim with tooth numbers"
size_bytes = 925

[[demo.data_files]]
path = "data/hipaa_837I_institutional_claim.edi"
format = "edi"
description = "837 — Healthcare claim institutional (GS=HC, guide=005010X223A2): BHT/NM1/CLM/SV2 facility claim with revenue codes"
size_bytes = 1259

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.hipaa_messages"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.edi.hipaa_materialized"
