[demo]
id = "json-music-catalog"
name = "JSON Music Catalog — Nested Arrays & Explode"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates nested JSON flattening with array explosion. A digital music \
distributor receives catalog feeds as JSON arrays with nested vendor objects \
and track detail arrays. Two tables show the dual-view pattern: album_tracks \
(exploded, one row per track) and album_summary (one row per album with track \
count and vendor as JSON blob). Covers explode_paths, json_paths, \
column_mappings, default_array_handling, and multi-file reading.
"""
categories = ["json"]
tags = ["json", "intermediate", "explode", "nested-arrays", "column-mappings", "json-paths", "multi-file"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing catalog JSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/catalog_jazz.json"
format = "json"
description = "Jazz genre catalog — 31 albums with nested vendor and track arrays"
size_bytes = 112940

[[demo.data_files]]
path = "data/catalog_pop.json"
format = "json"
description = "Pop genre catalog — 136 albums with nested vendor and track arrays"
size_bytes = 332272

[[demo.data_files]]
path = "data/catalog_rock.json"
format = "json"
description = "Rock genre catalog — 180 albums with nested vendor and track arrays"
size_bytes = 650379
