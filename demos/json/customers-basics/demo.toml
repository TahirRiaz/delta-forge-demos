[demo]
id = "json-customers-basics"
name = "JSON Customers — Basics"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates JSON fundamentals: creating an external table from a JSON array \
file, applying column mappings for clean names, and using type hints for \
proper timestamp handling. A CRM customer export with 200 records shows \
include_paths, column_mappings, and file_metadata features.
"""
categories = ["json"]
tags = ["json", "beginner", "column-mappings", "type-hints", "basics"]
difficulty = "beginner"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Path to the directory containing customers.json", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }
