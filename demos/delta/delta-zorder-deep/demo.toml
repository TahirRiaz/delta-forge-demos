[demo]
id = "delta-zorder-deep"
name = "Delta Z-ORDER — Multi-Column Data Layout Optimization"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Z-ORDER is a Delta Lake optimization that reorganizes data files using a \
space-filling curve to co-locate rows with similar values across multiple \
columns, enabling efficient data skipping for multi-dimensional queries. \
Unlike single-column sorting, Z-ORDER balances locality across ALL specified \
columns simultaneously, so filters on region AND/OR sensor_type AND/OR date \
all benefit. \
This demo builds an IoT telemetry table in 3 batches, applies Z-ORDER \
across 3 columns, and shows how the optimized layout supports diverse query \
patterns.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "z-order", "optimize", "iot", "telemetry", "performance", "multi-column"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.sensor_telemetry"
