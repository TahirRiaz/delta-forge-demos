[demo]
id = "delta-unicode-encoding"
name = "Delta Unicode & Encoding — International Data"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta tables inherit Parquet's native UTF-8 encoding, which means full Unicode \
support for strings including CJK, Arabic, Cyrillic, and Latin diacritics. \
This is critical for any global application where product names, user data, or \
content must be stored faithfully in their original script. \
This demo uses a partitioned global product catalog to show how Delta handles \
multi-script data across partitions, preserving Unicode fidelity through \
INSERT, UPDATE, and DELETE operations.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "unicode", "encoding", "international", "partitioning", "i18n"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.global_products"
