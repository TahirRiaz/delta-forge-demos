[demo]
id = "delta-merge-advanced"
name = "Delta MERGE — Advanced Patterns & Conditional Logic"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta MERGE INTO supports multiple WHEN MATCHED clauses with conditional \
predicates, enabling complex write patterns in a single atomic operation. \
This solves the common ETL problem of needing to update, delete, and \
insert rows based on different business rules within one transaction. \
This demo merges staged inventory updates into a master table using \
conditional update (qty > 0), conditional delete (qty = 0), and insert \
for new SKUs.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "merge", "upsert", "conditional", "etl", "staging"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.inventory_master"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.inventory_updates"
