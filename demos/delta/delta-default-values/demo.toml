[demo]
id = "delta-default-values"
name = "Delta Column Default Values"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Column default values fill in missing fields automatically during INSERT, \
reducing boilerplate and preventing NULL values from propagating through \
analytics pipelines. When CREATE TABLE does not support the DEFAULT keyword, \
CTEs with COALESCE provide an equivalent pattern at the SQL level. This demo \
applies defaults for severity, user_name, retry_count, and notes across \
multiple insert batches, then uses UPDATE to archive old entries.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "default-values", "coalesce", "cte", "audit"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.audit_log"
