[demo]
id = "delta-restore-advanced"
name = "Delta RESTORE — Advanced Recovery Scenarios"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta RESTORE TO VERSION rolls an entire table back to a previous \
transaction log version, undoing all intermediate commits in a single \
atomic operation. This is a safety net for recovering from bad deployments, \
accidental bulk deletes, or corrupted data loads without needing backups. \
This demo builds a multi-version history with tuning changes, a config \
deployment, and a dangerous bulk delete, then restores to a known-good \
version and continues writing.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "restore", "recovery", "version-history", "rollback", "configuration"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.config_settings"
