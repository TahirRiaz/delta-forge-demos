[demo]
id = "delta-advanced-sql"
name = "Delta Advanced SQL — Windows, CTEs & Analytics"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta tables support the full power of SQL analytics including window \
functions, CTEs, and advanced aggregations, making them a drop-in \
replacement for traditional data warehouses. This matters because \
analytical workloads on open table formats eliminate vendor lock-in while \
preserving ACID guarantees. This demo runs LAG, RANK, ROW_NUMBER, running \
SUM, moving averages, and multi-step CTEs against a stock prices dataset.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "window-functions", "cte", "analytics", "rank", "lag", "running-total"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.stock_prices"
