[demo]
id = "delta-in-commit-timestamps"
name = "Delta In-Commit Timestamps — Reliable Version Timing"
version = "1.0.0"
author = "Delta Forge Team"
description = """
In-commit timestamps embed a reliable, monotonically increasing timestamp \
directly into each Delta transaction log commit, solving the problem of \
clock skew between distributed writers. Without this feature, TIMESTAMP \
AS OF time travel queries can return incorrect results when writer clocks \
disagree. This demo enables in-commit timestamps on a deployment log and \
performs multi-batch inserts and updates across environments to build a \
rich version history suitable for time travel.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "in-commit-timestamps", "time-travel", "versioning", "deployment"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.deployment_log"
