[demo]
id = "delta-time-travel-point-in-time-join"
name = "Delta Time Travel — Point-in-Time Joins"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Regulatory reporting requires valuing each trade using the exchange rate \
that was active at the time of the trade — not today's rate. When the \
rate table has been updated multiple times, a standard JOIN uses only \
the latest values, producing incorrect valuations. VERSION AS OF in the \
JOIN clause lets you pin a dimension table to its historical state, \
giving each trade the rate that was live when it executed. This demo \
shows the dollar impact of getting this wrong and the correct \
point-in-time JOIN technique.
"""
categories = ["delta-table", "delta-versioning"]
tags = ["delta-table", "advanced", "time-travel", "temporal-join", "finance", "regulatory"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.fx_trades"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.fx_rates"
