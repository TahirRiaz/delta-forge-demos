[demo]
id = "delta-variant-type"
name = "Delta Variant Data Type — Semi-Structured Data"
version = "1.0.0"
author = "Delta Forge Team"
description = """
The VARIANT type (modeled here via VARCHAR with JSON strings) enables storing \
semi-structured data with different shapes in the same column, avoiding the \
need to define rigid schemas for every possible payload format upfront. \
This solves the "schema explosion" problem where event-driven systems produce \
messages with varying structures (logins, purchases, errors, system events). \
This demo shows how an API gateway event log stores heterogeneous JSON payloads \
in a single column and queries them using string pattern matching.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "variant", "semi-structured", "json", "api-events", "flexible-schema"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.api_events"
