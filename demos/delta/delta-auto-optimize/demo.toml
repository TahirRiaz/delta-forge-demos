[demo]
id = "delta-auto-optimize"
name = "Delta Auto-Optimize — Automatic Compaction & Write Optimization"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta Auto-Optimize uses the table properties 'delta.autoOptimize.optimizeWrite' \
and 'delta.autoOptimize.autoCompact' to automatically coalesce small Parquet files \
into larger ones during writes. Without it, frequent small INSERTs create a "small \
files problem" that degrades read performance due to excessive file-open overhead. \
This demo ingests IoT sensor data across 7 small batches to show how auto-optimize \
transparently compacts files behind the scenes.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "auto-optimize", "compaction", "small-files", "iot", "performance"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.iot_readings"
