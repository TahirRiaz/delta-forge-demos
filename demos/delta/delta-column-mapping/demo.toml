[demo]
id = "delta-column-mapping"
name = "Delta Column Mapping — Physical & Logical Names"
version = "1.0.0"
author = "DeltaForge Team"
description = """
Delta Column Mapping (mode 'name') decouples logical column names in the \
schema from physical column names in Parquet files, enabling ALTER TABLE \
operations like column rename, drop, and add without rewriting data files. \
This requires reader version 2 and writer version 5 in the Delta protocol. \
This demo creates a column-mapped employee directory, then uses ALTER TABLE \
ADD COLUMN to add a 'location' field — showing how new columns appear as \
NULL in existing rows without any data rewrite.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "column-mapping", "tblproperties", "alter-table", "add-column", "protocol", "parquet"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.employee_directory"
