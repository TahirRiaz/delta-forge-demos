[demo]
id = "delta-table-features"
name = "Delta Protocol & Table Features"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta Lake's table features are protocol-level capabilities enabled via \
TBLPROPERTIES that control how reads and writes behave. They solve the \
problem of forward compatibility: readers and writers must declare which \
features they support. This demo shows Change Data Feed for tracking \
modifications and append-only mode for audit-safe tables, demonstrating \
how TBLPROPERTIES shape table behavior.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "protocol", "features", "tblproperties", "cdc", "deletion-vectors"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.feature_demo"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.audit_trail"
