[demo]
id = "delta-zorder-transactions"
name = "Delta Z-ORDER & Transaction Management"
version = "1.0.0"
author = "Delta Forge Team"
description = """
OPTIMIZE ZORDER is recorded as an atomic transaction in the Delta log, meaning \
the entire file reorganization either completes fully or not at all -- readers \
never see a partially optimized state. \
This matters because OPTIMIZE rewrites potentially all data files, and concurrent \
readers must continue seeing consistent data throughout the process. \
This demo builds a web analytics table in 3 batches, runs Z-ORDER optimization, \
then applies a post-optimize UPDATE to show how transactions maintain consistency \
across optimization and DML operations.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "z-order", "optimize", "transactions", "analytics", "performance"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.web_analytics"
