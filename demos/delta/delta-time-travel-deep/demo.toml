[demo]
id = "delta-time-travel-deep"
name = "Delta Time Travel — Version History Deep Dive"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Time travel is Delta Lake's ability to query any previous version of a \
table using VERSION AS OF, giving you instant access to historical \
snapshots without maintaining separate copies. It solves the problem of \
auditing changes, debugging data issues, and reproducing past results. \
This demo builds a 4-version history of IoT sensor data to show how \
time travel lets you compare states before and after calibration, \
recover deleted readings, and trace the table's evolution.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "time-travel", "versioning", "history", "iot"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.sensor_readings"
