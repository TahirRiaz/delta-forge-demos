[demo]
id = "delta-merge-comprehensive"
name = "Delta MERGE Comprehensive — All Clause Patterns"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta MERGE INTO combines update, delete, and insert logic into a single \
atomic transaction, which is critical for maintaining consistency in CRM \
and master data management systems. This demo exercises all three MERGE \
clause types against a customer database: conditional update for active \
accounts, conditional delete for closed accounts, and insert for new \
customers -- all in one operation.
"""
categories = ["delta-table"]
tags = ["delta-table", "advanced", "merge", "update", "delete", "insert", "matched", "not-matched", "crm"]
difficulty = "advanced"
estimated_time_minutes = 12

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.customer_master"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.customer_updates"
