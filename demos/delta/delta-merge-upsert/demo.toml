[demo]
id = "delta-merge-upsert"
name = "Delta MERGE — Upsert, Conditional Update & Delete"
version = "1.0.0"
author = "Delta Forge Team"
description = """
The MERGE INTO upsert pattern is the foundation of change data capture \
(CDC) pipelines, atomically applying inserts, updates, and deletes from \
a staging source to a target table. The WHEN NOT MATCHED BY SOURCE clause \
is particularly powerful -- it lets you detect and act on target rows that \
have no corresponding source record (e.g., removing stale data). This \
demo merges customer updates with conditional tier promotion, new customer \
inserts, and automatic cleanup of stale bronze-tier records.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "merge", "upsert", "cdc", "matched", "not-matched"]
difficulty = "intermediate"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.customers"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.customer_updates"
