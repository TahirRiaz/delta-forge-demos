[demo]
id = "delta-statistics"
name = "Delta Statistics — Min/Max & Data Skipping"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Delta Lake stores per-file column statistics (min, max, null count, row \
count) in the transaction log, enabling data skipping that avoids reading \
irrelevant Parquet files entirely. This is one of Delta's most important \
performance features, often reducing query times by orders of magnitude on \
large tables. This demo uses sensor readings with non-overlapping value \
ranges across batches to illustrate how statistics enable file pruning.
"""
categories = ["delta-table"]
tags = ["delta-table", "intermediate", "statistics", "min-max", "data-skipping", "null", "performance"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.delta_demos.sensor_readings"
