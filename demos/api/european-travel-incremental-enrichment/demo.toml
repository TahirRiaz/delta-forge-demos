[demo]
id = "api-european-travel-incremental-enrichment"
name = "European Travel — Incremental Wave-Based Enrichment"
version = "1.0.0"
description = """
Parameter-driven REST API ingest demo. A travel-tech startup enriches
its country reference catalog in geographical waves: the Nordic wave
(NO, SE, DK, IS) is the launch seed; this demo runs the Baltic-plus-
Finland wave (FI, EE, LV, LT) using the REST Countries /v3.1/alpha
batch endpoint, narrowed via a query_param.codes parameter.

Walks the "check target table → compute gap → parameterise ingest →
invoke" pattern a scheduled pipeline runs every week to pick up the
next region:
  1. Silver catalog is the source of incremental truth.
  2. An anti-join against silver computes the codes still missing.
  3. query_param.codes on the ingest is set to that gap (CREATE time
     here for idempotency; ALTER ... SET OPTIONS in a real pipeline).
  4. INVOKE API INGEST fetches just the missing wave over HTTPS.
  5. A NOT EXISTS merge from bronze into silver keeps the load
     idempotent — replays are no-ops, not duplicates.

Demonstrates: CREATE CREDENTIAL (OS keychain), CREATE CONNECTION
TYPE = rest_api, CREATE API INGEST with query_param.<name> bindings,
INVOKE API INGEST against a live HTTPS endpoint, CREATE EXTERNAL TABLE
USING JSON with json_flatten_config, and the anti-join INSERT pattern
for idempotent incremental merge.

NOTE: requires internet. INVOKE issues a real GET against
https://restcountries.com/v3.1/alpha?codes=fi,ee,lv,lt.
"""
categories = ["api", "rest-ingest", "incremental"]
tags = ["api", "rest", "ingest", "incremental", "parameters", "query-param", "watermark", "credentials", "keychain", "json", "flatten", "delta-table", "anti-join", "idempotent"]
difficulty = "advanced"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Reserved by the harness; this demo downloads its data via INVOKE rather than reading shipped files. LOCATIONs resolve relative to the bronze zone's storage root.", required = false }
zone_name = { description = "Target zone for the bronze landing path and the silver catalog. Defaults to `bronze`.", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.travel_waves.country_catalog"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.travel_waves.alpha_batch_bronze"
