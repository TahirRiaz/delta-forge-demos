[demo]
id = "excel-sales-analytics"
name = "Excel Sales Analytics — Superstore Orders"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates Excel reading features using 4 years of Superstore sales data \
(2014–2017, 16,676 orders). Five tables exercise sheet_name, has_header, \
skip_rows, max_rows, range, trim_whitespace, null_values, empty_cell_handling, \
infer_schema_rows, column_prefix, multi-file reading, file_metadata, and \
automatic type inference for dates, numbers, and strings.
"""
categories = ["excel", "retail"]
tags = ["excel", "intermediate", "sheet-name", "range", "multi-file", "type-inference", "file-metadata"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing the 4 Superstore XLSX files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/sales-data-2014.xlsx"
format = "excel"
description = "Superstore orders 2014 — 1,993 orders"
size_bytes = 303318

[[demo.data_files]]
path = "data/sales-data-2015.xlsx"
format = "excel"
description = "Superstore orders 2015 — 2,102 orders"
size_bytes = 317953

[[demo.data_files]]
path = "data/sales-data-2016.xlsx"
format = "excel"
description = "Superstore orders 2016 — 2,587 orders"
size_bytes = 384561

[[demo.data_files]]
path = "data/sales-data-2017.xlsx"
format = "excel"
description = "Superstore orders 2017 — 9,994 orders"
size_bytes = 587173

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.excel.all_orders"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.excel.orders_2017"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.excel.orders_range"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.excel.orders_trimmed"

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.excel.orders_no_header"
