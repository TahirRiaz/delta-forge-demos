[demo]
id = "fhir-xml-clinical-resources"
name = "FHIR XML — Clinical Patients & Observations"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates HL7 FHIR R4 clinical data in native XML format. FHIR XML is \
unique: all primitive values are stored as @value attributes rather than \
element text content. 8 Patient resources show demographics with repeating \
<name>, <telecom>, and <identifier> elements. 8 Observation resources cover \
vital signs and lab results with deep nesting: code/coding/code/@value \
(4 levels). Showcases FHIR namespace handling, @value attribute extraction, \
exclude_paths for narrative XHTML, xml_paths for complex subtrees (contact, \
component, referenceRange), join_comma for repeating elements, column_mappings \
from deep XPaths to friendly names, and schema evolution across resource \
instances.
"""
categories = ["healthcare", "xml"]
tags = ["fhir", "healthcare", "xml", "intermediate", "patient", "observation", "namespace", "attribute-extraction", "xpath", "schema-evolution"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing FHIR R4 Patient and Observation XML files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

