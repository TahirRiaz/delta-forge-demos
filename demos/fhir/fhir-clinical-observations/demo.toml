[demo]
id = "fhir-clinical-observations"
name = "FHIR Clinical Observations — Vital Signs & Lab Results"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates FHIR R5 Observation resource ingestion across two data sources: \
a bulk NDJSON export of 100 heart rate observations and 14 individual clinical \
observation files covering vital signs (body weight, height, BMI, blood \
pressure, temperature, respiratory rate, SpO2), lab results (glucose, CO2, \
hemoglobin, erythrocyte), and clinical assessments (Glasgow Coma Scale). Two \
tables show bulk vs individual resource patterns. Covers deep nested JSON \
flattening (CodeableConcept, Quantity, Reference), column_mappings for FHIR \
paths, schema evolution across observation types, and multi-file reading.
"""
categories = ["healthcare", "json"]
tags = ["fhir", "healthcare", "json", "intermediate", "observation", "vital-signs", "lab-results", "ndjson", "nested-json"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing FHIR Observation JSON and NDJSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/Observation.ndjson"
format = "ndjson"
description = "FHIR Bulk Data export — 100 heart rate observations, one JSON object per line"
size_bytes = 33000

[[demo.data_files]]
path = "data/observation-example.json"
format = "json"
description = "Body Weight observation — 185 lbs with LOINC and SNOMED coding"
size_bytes = 4200

[[demo.data_files]]
