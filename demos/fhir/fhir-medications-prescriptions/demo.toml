[demo]
id = "fhir-medications-prescriptions"
name = "FHIR Medications — Prescriptions & Coverage"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates FHIR R5 MedicationRequest and Coverage resource ingestion. \
12 MedicationRequest resources show prescriptions with contained Medication \
resources, dosage instructions, dispense requests, and substitution rules. \
4 Coverage resources model insurance plans with coverage classes and \
beneficiary references. Two tables demonstrate deeply nested FHIR structures \
including contained resources, CodeableConcept arrays, dosageInstruction \
timing, and complex dispense/substitution objects. Covers json_paths for \
preserving nested subtrees, column_mappings, and schema evolution across \
prescription types.
"""
categories = ["healthcare", "json"]
tags = ["fhir", "healthcare", "json", "intermediate", "medication", "prescription", "coverage", "insurance", "nested-json", "contained-resources"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the directory containing FHIR MedicationRequest and Coverage JSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

