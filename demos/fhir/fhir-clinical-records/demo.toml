[demo]
id = "fhir-clinical-records"
name = "FHIR Clinical Records — Conditions, Procedures & Allergies"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates advanced FHIR R5 resource ingestion across three clinical \
resource types: Condition (8 diagnoses), Procedure (8 surgical/clinical \
procedures), and AllergyIntolerance (6 allergy records). Three tables \
showcase schema evolution across related but structurally different \
resource types, deep nested arrays (reaction[], performer[], bodySite[]), \
CodeableConcept hierarchies with multiple coding systems (SNOMED CT, ICD-10), \
and cross-resource references. Covers json_paths for reaction arrays, \
column_mappings, multi-resource-type directory scanning, and FHIR clinical \
data model relationships.
"""
categories = ["healthcare", "json"]
tags = ["fhir", "healthcare", "json", "advanced", "condition", "procedure", "allergy", "clinical", "snomed", "multi-resource", "deep-nesting"]
difficulty = "advanced"
estimated_time_minutes = 10

[demo.variables]
data_path = { description = "Path to the directory containing FHIR Condition, Procedure, and AllergyIntolerance JSON files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

