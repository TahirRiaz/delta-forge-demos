[demo]
id = "iceberg-native-time-travel"
name = "Iceberg Native — Time Travel (Stock Prices)"
version = "1.0.0"
author = "Delta Forge Team"
icon = "time-travel"
description = """\
Demonstrates native Apache Iceberg format-version 2 table reading after \
multiple snapshot-producing mutations. A stock price dataset starts with \
120 records (20 tickers x 6 trading days), then undergoes a tech-sector \
price correction (UPDATE +5%), IPO insertions (30 new rows), and delisted \
ticker removals (DELETE 12 rows). The final snapshot contains 138 rows \
reflecting all four mutations. Queries verify the current state — correct \
row counts, sector breakdowns, presence of IPO tickers, and absence of \
delisted tickers — exercising Iceberg V2 merge-on-read with position \
delete files.
"""
categories = ["iceberg"]
tags = ["iceberg", "advanced", "read-only", "native-format", "v2", "time-travel", "merge-on-read", "position-deletes", "stocks"]
difficulty = "advanced"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "stock_prices/data/00000-0-1752b09e-560a-4a63-bf45-a389cd057a36-0-00001.parquet"
format = "parquet"
description = "Snapshot 1: initial 120 stock price records (20 tickers x 6 days)"
size_bytes = 4769

[[demo.data_files]]
path = "stock_prices/data/00000-4-b4735b53-d586-48c7-821e-b5574e499cb4-00001.parquet"
format = "parquet"
description = "Snapshot 2: rewritten tech-sector rows with +5% price correction"
size_bytes = 3359

[[demo.data_files]]
path = "stock_prices/data/00000-4-b4735b53-d586-48c7-821e-b5574e499cb4-00001-deletes.parquet"
format = "parquet"
description = "Snapshot 2: position delete file marking original tech rows for removal"
size_bytes = 1659

[[demo.data_files]]
