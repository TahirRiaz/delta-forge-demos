[demo]
id = "iceberg-uniform-change-data-feed"
name = "E-Commerce Order Lifecycle — Change Data Feed with UniForm"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Tests Change Data Feed (CDF) integration with UniForm Iceberg metadata.
Inserts 30 e-commerce orders, updates pending orders to processing, deletes
cancelled orders, then verifies both the final Delta state and the Iceberg
read-back produce identical results. Proves that CDF mutations are correctly
reflected in the shadow Iceberg metadata chain.
"""
categories = ["iceberg", "change-data-feed"]
tags = ["iceberg", "uniform", "cdf", "change-data-feed", "intermediate", "crud", "e-commerce"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_cdf.orders"
