[demo]
id = "iceberg-uniform-constraints"
name = "Bank Transaction Validation — CHECK Constraints with UniForm"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Tests CHECK constraints (delta.constraints.*) on a UniForm Iceberg table.
25 bank transactions across 5 accounts and 3 currencies enforce positive
amounts and valid currency codes. Queries verify constraint metadata via
SHOW TBLPROPERTIES, then test data integrity through both the Delta and
Iceberg metadata chains.
"""
categories = ["iceberg", "constraints"]
tags = ["iceberg", "uniform", "constraints", "check-constraints", "intermediate", "banking", "data-quality"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_constraints.transactions"
