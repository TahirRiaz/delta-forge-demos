[demo]
id = "iceberg-uniform-bloom-filters"
name = "Customer Loyalty Program — Bloom Filters with UniForm"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Tests BLOOM FILTER COLUMNS on a UniForm Iceberg table. 40 loyalty members
across 4 tiers exercise point lookups by member_id and full_name, which
benefit from bloom filter indexes. Queries demonstrate tier-based analytics,
filtered lookups, and verify data fidelity through Iceberg read-back.
"""
categories = ["iceberg", "bloom-filters"]
tags = ["iceberg", "uniform", "bloom-filters", "optimization", "intermediate", "loyalty", "point-lookup"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_bloom.members"
