[demo]
id = "iceberg-v3-clinical-trials"
name = "Iceberg V3 — Clinical Trial Lab Results"
version = "1.0.0"
author = "DeltaForge Team"
description = """\
Demonstrates native Apache Iceberg format-version 3 table reading using a \
pharmaceutical clinical trial lab results dataset (480 samples across 3 \
trial sites). The table was generated by Apache Spark 4.0 with Iceberg \
1.10.1 and uses the V3 metadata format. Exercises V3 metadata chain \
parsing, schema inference, site-level aggregations, abnormal result \
detection, and analyst workload analysis — all without conversion to \
Delta format.
"""
categories = ["iceberg"]
tags = ["iceberg", "intermediate", "read-only", "native-format", "v3", "metadata-chain", "clinical", "pharma"]
difficulty = "intermediate"
estimated_time_minutes = 6

[demo.variables]
data_path = { description = "Path to the Iceberg table root (containing metadata/ and data/ subdirectories)", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "iceberg_warehouse/trials/lab_results/data/00000-0-d569ed5f-e3d8-4b5b-b924-feedb56fbd7c-0-00001.parquet"
format = "parquet"
description = "All 480 clinical trial lab results (single Parquet data file)"
size_bytes = 8267

[[demo.data_files]]
path = "iceberg_warehouse/trials/lab_results/metadata/v2.metadata.json"
format = "json"
description = "Iceberg format v3 metadata (schema, snapshots, partition specs)"
size_bytes = 2675

[[demo.data_files]]
path = "iceberg_warehouse/trials/lab_results/metadata/snap-8055339746846732601-1-b367813e-a163-4b6a-a326-5d0ceea02f6d.avro"
format = "avro"
description = "Iceberg manifest list (Avro) — pointers to data manifests"
size_bytes = 4787

[[demo.data_files]]
path = "iceberg_warehouse/trials/lab_results/metadata/b367813e-a163-4b6a-a326-5d0ceea02f6d-m0.avro"
format = "avro"
description = "Iceberg data manifest (Avro) — pointers to Parquet data files"
size_bytes = 8776

[[demo.target_objects]]
type = "external_table"
name = "{{zone_name}}.iceberg_demos.lab_results"
