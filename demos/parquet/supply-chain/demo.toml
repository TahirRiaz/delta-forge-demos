[demo]
id = "parquet-supply-chain"
name = "Parquet Supply Chain — Order Analytics"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Demonstrates Parquet reading features using 14 quarterly order files (2012–2016, \
73,089 rows) organized in year-based subdirectories. Four tables exercise \
recursive directory scanning, file_filter for year/quarter extraction, max_rows \
for sampling, row_group_filter for predicate pushdown, file_metadata for \
traceability, and Parquet's self-describing schema with automatic type detection.
"""
categories = ["parquet", "retail"]
tags = ["parquet", "intermediate", "recursive", "file-filter", "row-group-filter", "multi-file", "file-metadata"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Path to the demo directory containing the orders/ subdirectory with Parquet files", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.data_files]]
path = "data/orders/2012/Orders_2012-12-25-2013-02-28.parquet"
format = "parquet"
description = "Q4 2012 — 2,784 orders"
size_bytes = 46754

