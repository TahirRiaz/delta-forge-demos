[demo]
id = "graph-cypher-queries"
name = "Graph Cypher Queries — Pattern Matching & Algorithms"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Demonstrates Cypher query language support in Delta Forge. Uses the same \
50-employee startup graph as the flattened/hybrid/json demos but queries it \
exclusively with Cypher pattern matching (MATCH, WHERE, RETURN) and graph \
algorithm procedures (CALL algo.pageRank, algo.betweenness, algo.shortestPath, \
algo.triangleCount, algo.louvain, etc.). Shows the full power of Delta Forge's \
graph analytics engine with realistic community structure.
"""
categories = ["graph"]
tags = ["graph", "cypher", "pattern-matching", "algorithms", "pagerank", "pathfinding", "generate-series", "intermediate"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "graph"
name = "cypher_demo"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.graph.friendships_cypher"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.graph.persons_cypher"
