[demo]
id = "graph-cypher-queries"
name = "Graph Cypher Queries — Pattern Matching & Algorithms"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Demonstrates Cypher query language support in Delta Forge. Uses the same 5-person \
social graph as the flattened demo but queries it with Cypher pattern matching \
(MATCH, WHERE, RETURN) and graph algorithm procedures (CALL algo.pageRank, \
algo.betweenness, algo.shortestPath, algo.triangleCount, algo.louvain, etc.). \
Shows the full power of Delta Forge's graph analytics engine.
"""
categories = ["graph"]
tags = ["graph", "cypher", "pattern-matching", "algorithms", "pagerank", "pathfinding", "intermediate"]
difficulty = "intermediate"
estimated_time_minutes = 8

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }
