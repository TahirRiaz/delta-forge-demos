[demo]
id = "graph-stress-test"
name = "Graph Stress Test — 1M-Node Performance Benchmark"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Extreme-scale graph performance benchmark: 1,000,000 vertex nodes and \
5,000,000+ directed edges across 20 departments, 15 cities, and 200 project \
teams. Uses deterministic generate_series() data generation. Designed to \
stress-test graph rendering, layout algorithms, traversal queries, and \
memory handling at massive scale. Queries cover multi-hop traversals, \
PageRank approximation, community detection, heavy aggregation, and large \
join pipelines.
"""
categories = ["graph"]
tags = ["graph", "delta-table", "stress-test", "performance", "benchmark", "million-scale", "generate-series", "advanced"]
difficulty = "advanced"
estimated_time_minutes = 30

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }
