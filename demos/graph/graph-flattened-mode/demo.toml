[demo]
id = "graph-flattened-mode"
name = "Graph Flattened Mode — Direct Column Access"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Demonstrates the FLATTENED property storage mode for graph tables. All vertex \
and edge properties are stored as individual columns — the fastest mode with \
full predicate pushdown. Creates a 5-person social graph with 6 directed \
friendships. Queries demonstrate traversal, aggregation, triangle detection, \
and path analysis using standard SQL joins.
"""
categories = ["graph"]
tags = ["graph", "delta-table", "flattened", "vertices", "edges", "traversal", "beginner"]
difficulty = "beginner"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }
