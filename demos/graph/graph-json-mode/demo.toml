[demo]
id = "graph-json-mode"
name = "Graph JSON Mode — Schema-Free Properties"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Demonstrates the JSON property storage mode for graph tables. Vertex and edge \
properties are stored in a single JSON string column — the most flexible mode \
for schema-free, evolving data. Same 5-person social graph with 6 directed \
friendships as flattened mode. Queries demonstrate JSON extraction functions, \
dynamic property discovery, and filtering on nested JSON values.
"""
categories = ["graph"]
tags = ["graph", "delta-table", "json", "schema-free", "vertices", "edges", "intermediate"]
difficulty = "intermediate"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }
