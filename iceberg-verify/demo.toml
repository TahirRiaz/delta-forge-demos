[demo]
id = "iceberg-uniform-verification"
name = "Iceberg UniForm — Independent Format Verification"
version = "1.0.0"
author = "Delta Forge Team"
description = """\
Creates 4 Delta tables with Iceberg UniForm enabled, exercises all mutation \
types (INSERT, UPDATE, DELETE, schema evolution), then uses an external \
reader (verify.py) to independently read the generated Iceberg metadata \
and compare against expected results. This is not a demo — it is a \
verification suite that proves the Iceberg metadata is correct.
"""
categories = ["iceberg"]
tags = ["iceberg", "verification", "uniform", "testing"]
difficulty = "advanced"
estimated_time_minutes = 5

[demo.variables]
data_path = { description = "Root path where Delta table data is stored", required = true }
zone_name = { description = "Target zone name for tables (defaults to 'external')", required = false }

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_verify.products"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_verify.sales"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_verify.evolve"

[[demo.target_objects]]
type = "delta_table"
name = "{{zone_name}}.iceberg_verify.v3_table"
